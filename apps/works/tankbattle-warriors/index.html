<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2-Player Tank Battle Game</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
            margin: 0;
            overflow: auto;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
        }
        .container {
            max-width: 100vw;
            margin: 30px auto 0 auto;
            text-align: center;
            overflow-x: auto;
        }
        h1 {
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px #0008;
        }
        .instructions {
            color: #eee;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px 0 10px 0;
            margin-bottom: 18px;
            font-size: 1.1em;
            box-shadow: 0 2px 8px #0004;
        }
        .canvas-wrapper {
            width: 100vw;
            max-width: 100vw;
            overflow-x: auto;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #222;
            border-radius: 16px;
            box-shadow: 0 4px 24px #0008;
            border: 3px solid #666;
            max-width: 100vw;
            height: auto;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>2-Player Tank Battle</h1>
    <div class="instructions">
        <b>Player 1</b>: Move - W/A/S/D, Shoot - V<br>
        <b>Player 2</b>: Move - Arrow Keys, Shoot - Space<br>
        Destroy your opponent!<br>
        <span style="color:#0f0">Green</span> vs <span style="color:#f00">Red</span>
    </div>
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="1200" height="900"></canvas>
    </div>
</div>
<script src="tank-battle.js"></script>
</body>
</html>
