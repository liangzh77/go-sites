                    const fragment = document.createDocumentFragment();
                    const text = node.nodeValue || '';
                    let cursor = 0;
                    text.replace(pattern, (match, offset) => {
                        if (offset > cursor) fragment.appendChild(document.createTextNode(text.slice(cursor, offset)));
                        const mark = document.createElement('mark');
                        mark.className = 'wiki-search-hit';
                        mark.textContent = match;
                        fragment.appendChild(mark);
                        cursor = offset + match.length;
                        return match;
                    });
                    if (cursor < text.length) fragment.appendChild(document.createTextNode(text.slice(cursor)));
                    node.parentNode.replaceChild(fragment, node);
                    pattern.lastIndex = 0;
                }
                const firstHit = this.contentEl.querySelector('.wiki-search-hit');
                if (firstHit && !Number.isFinite(this.scrollPositions[this.scrollIdentity(this.currentHistoryItem() || {})])) {
                    firstHit.scrollIntoView({ block: 'center', inline: 'nearest' });
                }
            }
        }

        // 应用程序主类
        class AIWebpagesApp {
            constructor() {
                this.currentTab = null;
                this.privatePageName = '我的';
                this.demoPageName = '演示';
                this.wikiPageName = 'wiki';
                this.searchPageName = '搜索';
                this.recommendationPageName = '推荐';
                this.authSessionKey = 'go-sites:private-visible';
                this.authSessionDurationMs = 7 * 24 * 60 * 60 * 1000;
                this.recommendationStorageKey = 'go-sites:recommendations';
                this.hasStoredAuthSession = this.hasValidStoredAuthSession();
                this.isAuthenticated = false;
                this.isEditingRecommendations = false;
                this.searchQuery = '';
                this.demoItems = [];
                this.recommendationOverrides = this.loadRecommendationOverrides();
                this.routePageName = this.getRoutePageName();
                this.wikiPanel = new WikiPanel(this);
                this.init();
            }

            init() {
                this.renderVisiblePages(this.routePageName || this.currentTab);
                this.bindAuthEvents();
                this.bindRouteEvents();
                this.updateAuthButton();
                if (this.hasStoredAuthSession) {
                    this.restoreAuthSession();
                }
            }

            getVisibleSourcePages() {
                const pages = {};
                Object.entries(WEBPAGES_DATA.pages).forEach(([pageName, pageData]) => {
                    if (pageName === this.privatePageName && !this.isAuthenticated) {
                        return;
                    }

                    pages[pageName] = pageData;
                    if (pageName === this.privatePageName && this.isAuthenticated) {
                        pages[this.demoPageName] = this.buildDemoPage();
                        pages[this.wikiPageName] = { wiki: true };
                    }
                });
                return pages;
            }

            getVisiblePages() {
                const sourcePages = this.getVisibleSourcePages();
                return {
                    [this.searchPageName]: this.buildSearchPage(this.getSearchSourcePages(sourcePages), this.searchQuery),
                    [this.recommendationPageName]: this.buildRecommendationPage(sourcePages),
                    ...sourcePages
                };
            }

            getSearchSourcePages(sourcePages = this.getVisibleSourcePages()) {
                const searchPages = { ...sourcePages };
                delete searchPages[this.demoPageName];
                delete searchPages[this.wikiPageName];
                if (this.isAuthenticated) {
                    searchPages[this.demoPageName] = this.buildDemoPage();
                }
                return searchPages;
            }

            renderVisiblePages(preferredPageName = this.currentTab) {
                this.generateTabs(preferredPageName);
                this.bindTabEvents();
                this.initializeTables();
                this.bindSearchEvents();
                this.bindDemoEvents();
                this.bindWikiEvents();
                this.checkFunctionCellTruncation();
                this.bindTableScrollEvents();
            }

            getPagePath(pageName) {
                return this.pageRouteMap()[pageName] || encodeURIComponent(this.getTabId(pageName));
            }

            pageRouteMap() {
                return {
                    [this.searchPageName]: 'search',
                    [this.recommendationPageName]: 'recommendations',
                    'AI工具': 'ai-tools',
                    '开发工具': 'dev-tools',
                    '实用工具': 'tools',
                    '娱乐与教育': 'fun',
                    '张牧作品': 'works',
                    [this.privatePageName]: 'private',
                    [this.demoPageName]: 'demo',
                    [this.wikiPageName]: 'wiki'
                };
            }

            getRoutePageName() {
                const parts = window.location.pathname.split('/').filter(Boolean);
                if (parts.length !== 1) return '';

                const segment = decodeURIComponent(parts[0]).toLowerCase();
                const routes = this.pageRouteMap();
                return Object.keys(routes).find(pageName => routes[pageName].toLowerCase() === segment) || '';
            }

            bindRouteEvents() {
                window.addEventListener('popstate', () => {
                    const pageName = this.getRoutePageName();
                    if (pageName) {
                        this.routePageName = pageName;
                        this.switchToPage(pageName, { updateHistory: false });
                        return;
                    }
                    this.routePageName = '';
                    this.renderVisiblePages();
                });
            }

            syncUrlToCurrentTab({ replace = false } = {}) {
                if (!this.currentTab) return;

                const path = this.getPagePath(this.currentTab);
                const nextUrl = `/${path}`;
                if (window.location.pathname === nextUrl) return;

                const state = { pageName: this.currentTab };
                if (replace) {
                    window.history.replaceState(state, '', nextUrl);
                } else {
                    window.history.pushState(state, '', nextUrl);
                }
            }

            // 从数据中生成标签页
            generateTabs(preferredPageName = this.currentTab) {
                const tabsContainer = document.getElementById('tabs');
                const contentSection = document.querySelector('.content-section');

                if (!WEBPAGES_DATA || !WEBPAGES_DATA.pages) {
                    console.error('WEBPAGES_DATA 未正确加载');
                    return;
                }

                tabsContainer.replaceChildren();
                contentSection.replaceChildren();

                const visiblePages = this.getVisiblePages();
                const pageNames = Object.keys(visiblePages);
                const defaultPageName = pageNames.includes(this.recommendationPageName) ? this.recommendationPageName : pageNames[0];
                const activePageName = pageNames.includes(preferredPageName) ? preferredPageName : defaultPageName;

                // 生成标签页按钮
                pageNames.forEach((pageName) => {
                    const tabButton = document.createElement('li');
                    const button = document.createElement('button');
                    button.dataset.tab = this.getTabId(pageName);
                    button.dataset.pageName = pageName;
                    button.className = `tab-btn ${pageName === activePageName ? 'tab-active' : ''}`;

                    if (pageName === this.searchPageName) {
                        button.classList.add('search-tab-btn');
                        button.setAttribute('aria-label', '搜索');
                        button.title = '搜索';
                        button.innerHTML = `${this.getSearchIconSvg()}<span class="sr-only">搜索</span>`;
                    } else {
                        button.textContent = pageName;
                    }

                    tabButton.appendChild(button);
                    tabsContainer.appendChild(tabButton);
                });

                // 生成内容区域
                pageNames.forEach((pageName) => {
                    const pageData = visiblePages[pageName];
                    const tabContent = this.createTabContent(pageName, pageName === activePageName, pageData);
                    contentSection.appendChild(tabContent);
                });

                this.currentTab = activePageName;
                this.scrollActiveTabIntoView({ instant: true });
            }

            // 获取标签页ID
            getTabId(pageName) {
                // 动态生成ID：移除特殊字符并转换为小写
                return pageName.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '').toLowerCase();
            }

            getSearchIconSvg() {
                return '<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>';
            }

            // 创建标签页内容
            createTabContent(pageName, isActive, pageData) {
                const tabId = this.getTabId(pageName);
                const div = document.createElement('div');
                div.id = tabId;
                div.className = `tab-content ${isActive ? 'fade-enter' : 'hidden'}`;
                if (pageName === this.wikiPageName) {
                    div.innerHTML = this.createWikiContent();
                    return div;
                }

                // 动态检查页面数据中是否有非空的功能字段
                const showFunctionColumn = pageName === this.searchPageName || pageName === this.demoPageName || pageData && pageData['类型'] && pageData['类型'].length > 0 &&
                                         pageData['类型'][0] && Object.values(pageData['类型'][0])[0] &&
                                         Object.values(pageData['类型'][0])[0][0] &&
                                         Object.values(pageData['类型'][0])[0][0].hasOwnProperty('功能') &&
                                         Object.values(pageData['类型'][0])[0][0]['功能'] &&
                                         Object.values(pageData['类型'][0])[0][0]['功能'].trim() !== '';
                const functionColumnHtml = showFunctionColumn ? '<th>功能</th>' : '';
                const tableClass = showFunctionColumn ? '' : 'no-function-column';
                const searchPanelHtml = pageName === this.searchPageName ? `
                            <div class="search-panel">
                                <label class="sr-only" for="${tabId}SearchInput">搜索名称、地址、备注、功能</label>
                                <div class="search-input-wrap">
                                    ${this.getSearchIconSvg()}
                                    <input id="${tabId}SearchInput" class="search-input" type="search" placeholder="搜索名称、地址、备注、功能" autocomplete="off">
                                </div>
                                <div id="${tabId}SearchStatus" class="search-status" aria-live="polite"></div>
                            </div>` : '';
                const demoPanelHtml = pageName === this.demoPageName ? `
                            <div class="demo-panel">
                                <input id="${tabId}DemoFileInput" class="hidden" type="file" accept=".html,.htm,.md,.markdown,.zip">
                                <div id="${tabId}DemoDropZone" class="demo-drop-zone" role="button" tabindex="0">
                                    添加文件：MD | html | zip
                                </div>
                                <div class="demo-controls">
                                    <label class="sr-only" for="${tabId}DemoTitleInput">演示名称</label>
                                    <input id="${tabId}DemoTitleInput" class="demo-title-input" type="text" placeholder="演示名称（可选）" autocomplete="off">
                                    <label class="sr-only" for="${tabId}DemoMarkdownInput">粘贴 MD 内容</label>
                                    <textarea id="${tabId}DemoMarkdownInput" class="demo-markdown-input" placeholder="粘贴 MD 内容"></textarea>
                                    <button id="${tabId}DemoMarkdownButton" class="demo-submit-btn" type="button">添加 Markdown</button>
                                    <div id="${tabId}DemoStatus" class="demo-status" aria-live="polite"></div>
                                </div>
                            </div>` : '';

                div.innerHTML = `
                    <div class="content-layout">
                        <nav class="type-nav ${pageName === this.demoPageName ? 'has-demo-panel' : ''}">
                            <h3>类型导航</h3>
                            <div id="${tabId}TypeNavList" class="type-nav-list"></div>
                            ${demoPanelHtml}
                        </nav>
                        <div class="table-container">
                            ${searchPanelHtml}
                            <div class="table-scroll">
                                <table class="${tableClass}">
                                    <thead>
                                        <tr>
                                            <th class="type-cell">类型</th>
                                            <th>名称</th>
                                            <th>地址</th>
                                            <th>备注</th>
                                            ${functionColumnHtml}
                                        </tr>
                                    </thead>
                                    <tbody id="${tabId}TableBody">
                                        <!-- 数据将动态加载 -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;

                return div;
            }

            createWikiContent() {
                return `
                    <div class="wiki-layout">
                        <aside class="wiki-sidebar" data-wiki-sidebar>
                            <div class="wiki-panel-head">
                                <h3 class="wiki-tree-title" data-wiki-tree-toggle aria-controls="wikiTree">
                                    <span>文件树</span>
                                    <span class="wiki-tree-toggle-icon" aria-hidden="true">▾</span>
                                </h3>
                                <button class="wiki-nav-button" type="button" data-wiki-back aria-label="后退" title="后退（左方向键）" disabled>‹</button>
                                <button class="wiki-nav-button" type="button" data-wiki-forward aria-label="前进" title="前进（右方向键）" disabled>›</button>
                                <button class="wiki-nav-button wiki-mode-button" type="button" data-wiki-edit-mode aria-pressed="false" title="编辑文件树和正文">编辑</button>
                                <button class="wiki-nav-button" type="button" data-wiki-refresh aria-label="刷新 wiki" title="刷新 wiki">↻</button>
                            </div>
                            <nav id="wikiTree" class="wiki-file-tree" data-wiki-tree aria-label="Wiki 文件树"></nav>
                        </aside>
                        <article class="wiki-reader">
                            <div class="wiki-reader-head">
                                <div class="wiki-search-wrap">
                                    <label class="sr-only" for="wikiSearchInput">搜索文件名和正文内容</label>
                                    <input id="wikiSearchInput" class="wiki-search-input" type="search" placeholder="搜索文件名和正文内容" autocomplete="off" data-wiki-search>
                                    <span class="wiki-status" data-wiki-status aria-live="polite"></span>
                                </div>
                            </div>
            <div class="wiki-page-context">
                                <div class="wiki-page-meta">
                                    <span class="wiki-status" data-wiki-path></span>
                                    <span class="wiki-status" data-wiki-save-status></span>
                                    <h2 data-wiki-title>Wiki</h2>
                                </div>
                                <div class="wiki-page-tools" aria-label="正文折叠控制">
                                    <button class="wiki-page-tool" type="button" data-wiki-collapse-all disabled>全部收缩</button>
                                    <button class="wiki-page-tool" type="button" data-wiki-expand-all disabled>全部展开</button>
                                </div>
                            </div>
                            <div class="wiki-markdown" data-wiki-content></div>
                        </article>
                    </div>
                `;
            }

            // 绑定标签切换事件
            bindTabEvents() {
                // 标签切换
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.switchTab(e.currentTarget));
                });
            }

            // 标签切换逻辑
            switchTab(button, { updateHistory = true } = {}) {
                const tabId = button.dataset.tab;

                // 隐藏所有内容
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.add('hidden');
                    content.classList.remove('fade-enter');
                });

                // 移除所有按钮的激活状态
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.remove('tab-active');
                });

                // 显示目标内容
                const targetContent = document.getElementById(tabId);
                if (targetContent) {
                    targetContent.classList.remove('hidden');
                    void targetContent.offsetWidth; // 强制重绘
                    targetContent.classList.add('fade-enter');
                }

                // 激活当前按钮
                button.classList.add('tab-active');

                // 更新当前标签页
                this.currentTab = button.dataset.pageName;
                this.routePageName = this.currentTab;

                if (this.currentTab === this.searchPageName) {
                    const searchInput = targetContent?.querySelector('.search-input');
                    searchInput?.focus();
                }
                if (this.currentTab === this.wikiPageName) {
                    this.wikiPanel.loadFiles();
                }

                // 切换标签后重新检测功能列截断
                this.checkFunctionCellTruncation();
                if (updateHistory) {
                    this.syncUrlToCurrentTab();
                }
                this.scrollActiveTabIntoView();
            }

            switchToPage(pageName, options = {}) {
                const button = Array.from(document.querySelectorAll('.tab-btn')).find(tabButton =>
                    tabButton.dataset.pageName === pageName
                );
                if (button) {
                    this.switchTab(button, options);
                }
            }

            scrollActiveTabIntoView({ instant = false } = {}) {
                const activeButton = document.querySelector('.tab-btn.tab-active');
                activeButton?.scrollIntoView({
                    block: 'nearest',
                    inline: 'center',
                    behavior: instant ? 'auto' : 'smooth'
                });
            }

            // 初始化所有表格
            initializeTables() {
                if (!WEBPAGES_DATA || !WEBPAGES_DATA.pages) {
                    console.error('WEBPAGES_DATA 未正确加载');
                    return;
                }

                const visiblePages = this.getVisiblePages();

                // 为每个可见页面生成表格
                Object.keys(visiblePages).forEach(pageName => {
                    if (pageName === this.wikiPageName) return;
                    const tabId = this.getTabId(pageName);
                    const tableBodyId = `${tabId}TableBody`;
                    const navListId = `${tabId}TypeNavList`;

                    this.generateTable(tableBodyId, navListId, visiblePages[pageName], pageName);
                });
            }

            // 生成表格的通用函数
            generateTable(tableBodyId, navListId, pageData, pageName) {
                const tableBody = document.getElementById(tableBodyId);
                if (!tableBody || !pageData || !pageData['类型']) return;

                tableBody.innerHTML = '';
                const types = []; // 收集类型列表

                // 同时生成移动端卡片视图
                this.generateMobileCards(tableBodyId, pageData, pageName);

                // 动态检查页面数据中是否有非空的功能字段
                const hasFunctionColumn = pageName === this.searchPageName || pageName === this.demoPageName || pageData['类型'].length > 0 &&
                                       pageData['类型'][0] &&
                                       Object.values(pageData['类型'][0])[0] &&
                                       Object.values(pageData['类型'][0])[0][0] &&
                                       Object.values(pageData['类型'][0])[0][0].hasOwnProperty('功能') &&
                                       Object.values(pageData['类型'][0])[0][0]['功能'] &&
                                       Object.values(pageData['类型'][0])[0][0]['功能'].trim() !== '';

                // 根据是否有功能列来设置表格的CSS类
                const table = tableBody.closest('table');
                if (table) {
                    if (hasFunctionColumn) {
                        table.classList.remove('no-function-column');
                    } else {
                        table.classList.add('no-function-column');
                    }

                    table.classList.toggle('recommendation-editable', this.isEditingRecommendations);
                }

                pageData['类型'].forEach(categoryObj => {
                    const categoryName = Object.keys(categoryObj)[0];
                    types.push(categoryName); // 添加到类型列表
                    const tools = categoryObj[categoryName];

                    tools.forEach((tool, index) => {
                        const row = document.createElement('tr');
                        if (pageName === this.demoPageName && tool.disabled) {
                            row.classList.add('is-disabled-demo');
                        }

                        // 类型列 - 第一行显示类型并设置rowspan，后续行不创建类型单元格
                        if (index === 0) {
                            const typeCell = document.createElement('td');
                            const typeText = document.createElement('span');
                            typeText.className = 'table-cell-text type-cell-text';
                            typeText.textContent = categoryName;
                            typeCell.appendChild(typeText);
                            typeCell.setAttribute('data-type', categoryName);
                            typeCell.rowSpan = tools.length; // 设置rowspan为工具数量
                            typeCell.classList.add('type-cell', 'merged'); // 添加合并样式
                            typeCell.classList.toggle('is-multi-row', tools.length > 1);
                            row.appendChild(typeCell);
                        }
                        // 后续行的类型单元格不创建，因为被第一行的rowspan覆盖

                        // 名称列
                        const nameCell = document.createElement('td');
                        nameCell.className = 'name-cell';
                        const nameLine = document.createElement('div');
                        nameLine.className = 'name-line';
                        if (pageName === this.demoPageName && this.isEditingRecommendations && tool.demoSlug) {
                            nameLine.appendChild(this.createDemoNameInput(tool));
                        } else {
                            const nameLink = document.createElement('a');
                            nameLink.href = tool.disabled ? '#' : this.getLinkAddress(tool['地址']);
                            nameLink.target = '_blank';
                            nameLink.textContent = tool['名称'];
                            nameLine.appendChild(nameLink);
                        }
                        if (this.isEditingRecommendations && pageName !== this.demoPageName) {
                            this.appendRecommendationControl(nameLine, tool);
                        }
                        nameCell.appendChild(nameLine);
                        if (!this.isEditingRecommendations && pageName !== this.demoPageName) {
                            this.appendRecommendationControl(nameCell, tool);
                        }
                        row.appendChild(nameCell);

                        // 地址列
                        const addressCell = document.createElement('td');
                        const displayAddress = this.getDisplayAddress(tool['地址']);
                        addressCell.className = 'address-cell';
                        const addressText = document.createElement('span');
                        addressText.className = 'table-cell-text address-cell-text';
                        addressText.textContent = displayAddress;
                        addressCell.appendChild(addressText);
                        addressCell.addEventListener('click', () => this.copyToClipboard(displayAddress, addressCell));
                        row.appendChild(addressCell);

                        // 备注列
                        const noteCell = document.createElement('td');
                        noteCell.className = 'note-cell';
                        const noteText = document.createElement('span');
                        noteText.className = 'table-cell-text note-cell-text';
                        noteText.textContent = tool['备注'] || '';
                        noteCell.appendChild(noteText);
                        row.appendChild(noteCell);

                        // 功能列（如果存在）
                        if (hasFunctionColumn) {
                            const functionCell = document.createElement('td');
                            functionCell.className = 'function-cell';
                            const functionText = tool['功能'] || '';
                            if (pageName === this.demoPageName && tool.demoSlug) {
                                this.appendDemoActions(functionCell, tool);
                            } else {
                                // 创建文本包装div，使用内联样式强制单行显示
                                const textWrapper = document.createElement('div');
                                textWrapper.className = 'table-cell-text function-cell-text';
                                textWrapper.textContent = functionText;
                                functionCell.appendChild(textWrapper);
                                // 添加data-full-text属性，用于tooltip显示完整文本
                                functionCell.setAttribute('data-full-text', functionText);
                            }
                            row.appendChild(functionCell);
                        }

                        tableBody.appendChild(row);
                    });
                });

                // 生成类型导航
                this.generateTypeNavigation(types, navListId, tableBodyId);
            }

            // 生成类型导航
            generateTypeNavigation(types, navListId, tableBodyId) {
                const navList = document.getElementById(navListId);
                if (!navList) return;

                navList.innerHTML = '';
                types.forEach(type => {
                    const navItem = document.createElement('div');
                    navItem.className = 'type-nav-item';
                    navItem.textContent = type;
                    navItem.addEventListener('click', () => this.scrollToType(type, navListId, tableBodyId));
                    navList.appendChild(navItem);
                });
            }

            // 生成移动端卡片视图
            generateMobileCards(tableBodyId, pageData, pageName) {
                const tableScroll = document.getElementById(tableBodyId)?.closest('.table-scroll');
                if (!tableScroll || !pageData || !pageData['类型']) return;

                // 移除现有的移动端卡片容器
                const existingMobileCards = tableScroll.querySelector('.mobile-cards');
                if (existingMobileCards) {
                    existingMobileCards.remove();
                }

                // 创建移动端卡片容器
                const mobileContainer = document.createElement('div');
                mobileContainer.className = 'mobile-cards';

                pageData['类型'].forEach(categoryObj => {
                    const categoryName = Object.keys(categoryObj)[0];
                    const tools = categoryObj[categoryName];

                    // 添加类型分组标题
                    const typeHeader = document.createElement('div');
                    typeHeader.className = 'mobile-type-header';
                    typeHeader.textContent = categoryName;
                    typeHeader.setAttribute('data-type', categoryName);
                    mobileContainer.appendChild(typeHeader);

                    // 为该类型下的每个工具创建卡片
                    tools.forEach(tool => {
                        const card = this.createMobileCard(tool, pageName);
                        mobileContainer.appendChild(card);
                    });
                });

                tableScroll.appendChild(mobileContainer);
            }

            // 创建单个移动端工具卡片
            createMobileCard(tool, pageName) {
                const card = document.createElement('div');
                card.className = 'mobile-card';

                // 解析备注获取标签，同时传入地址用于判断
                const tags = this.parseNoteTags(tool['备注'] || '', tool['地址'] || '');

                // 卡片头部：名称 + 标签
                const header = document.createElement('div');
                header.className = 'mobile-card-header';

                const summary = document.createElement('div');
                summary.className = 'mobile-card-summary';

                if (pageName === this.demoPageName && this.isEditingRecommendations && tool.demoSlug) {
                    summary.appendChild(this.createDemoNameInput(tool));
                } else {
                    const nameLink = document.createElement('a');
                    nameLink.className = 'mobile-card-name';
                    nameLink.href = tool.disabled ? '#' : this.getLinkAddress(tool['地址']);
                    nameLink.target = '_blank';
                    nameLink.textContent = tool['名称'];
                    summary.appendChild(nameLink);
                }
                if (!this.isEditingRecommendations && pageName !== this.demoPageName) {
                    this.appendRecommendationControl(summary, tool);
                }

                // 功能描述和标题同行展示，移动端空间不足时省略。
                if (tool['功能']) {
                    if (pageName === this.demoPageName && this.isEditingRecommendations && tool.demoSlug) {
                        summary.appendChild(this.createDemoFeatureInput(tool));
                    } else {
                        const desc = document.createElement('div');
                        desc.className = 'mobile-card-desc';
                        desc.textContent = tool['功能'];
                        desc.title = tool['功能'];
                        summary.appendChild(desc);
                    }
                }

                header.appendChild(summary);

                if (tags.length > 0) {
                    const tagsContainer = document.createElement('div');
                    tagsContainer.className = 'mobile-card-tags';
                    if (this.isEditingRecommendations && pageName !== this.demoPageName) {
                        this.appendRecommendationControl(tagsContainer, tool, { mobile: true });
                    }
                    tags.forEach(tag => {
                        const tagEl = document.createElement('span');
                        tagEl.className = `mobile-tag ${tag.class}`;
                        tagEl.textContent = tag.text;
                        tagsContainer.appendChild(tagEl);
                    });
                    header.appendChild(tagsContainer);
                } else {
                    const tagsContainer = document.createElement('div');
                    tagsContainer.className = 'mobile-card-tags';
                    if (this.isEditingRecommendations && pageName !== this.demoPageName) {
                        this.appendRecommendationControl(tagsContainer, tool, { mobile: true });
                    }
                    if (tagsContainer.childElementCount > 0) {
                        header.appendChild(tagsContainer);
                    }
                }

                if (tool.demoSlug) {
                    const actions = document.createElement('div');
                    actions.className = 'demo-actions mobile-demo-actions';
                    this.appendDemoActionButtons(actions, tool);
                    header.appendChild(actions);
                }

                card.appendChild(header);

                return card;
            }

            createDemoNameInput(tool) {
                const input = document.createElement('input');
                input.className = 'demo-name-input';
                input.type = 'text';
                input.value = tool['名称'] || '';
                input.dataset.demoTitleInput = 'true';
                input.dataset.demoSlug = tool.demoSlug;
                input.dataset.originalTitle = tool['名称'] || '';
                input.setAttribute('aria-label', '编辑演示名称');
                return input;
            }

            createDemoFeatureInput(tool) {
                const input = document.createElement('input');
                input.className = 'demo-feature-input';
                input.type = 'text';
                input.value = tool['功能'] || '';
                input.placeholder = '功能';
                input.dataset.demoFeatureInput = 'true';
                input.dataset.demoSlug = tool.demoSlug;
                input.dataset.originalFeature = tool['功能'] || '';
                input.setAttribute('aria-label', '编辑演示功能');
                return input;
            }

            appendDemoActions(functionCell, tool) {
                const actions = document.createElement('div');
                actions.className = 'demo-actions';

                if (this.isEditingRecommendations) {
                    actions.appendChild(this.createDemoFeatureInput(tool));
                } else {
                    const label = document.createElement('span');
                    label.className = 'table-cell-text function-cell-text demo-state-label';
                    label.textContent = tool['功能'] || '';
                    actions.appendChild(label);
                }

                this.appendDemoActionButtons(actions, tool);

                functionCell.appendChild(actions);
                functionCell.setAttribute('data-full-text', tool['功能'] || '');
            }

            appendDemoActionButtons(actions, tool) {
                const toggleButton = document.createElement('button');
                toggleButton.type = 'button';
                toggleButton.className = 'demo-action-btn';
                toggleButton.dataset.demoAction = tool.disabled ? 'enable' : 'disable';
                toggleButton.dataset.demoSlug = tool.demoSlug;
                toggleButton.textContent = tool.disabled ? '启用' : '禁用';
                actions.appendChild(toggleButton);

                const deleteButton = document.createElement('button');
                deleteButton.type = 'button';
                deleteButton.className = 'demo-action-btn danger';
                deleteButton.dataset.demoAction = 'delete';
                deleteButton.dataset.demoSlug = tool.demoSlug;
                deleteButton.textContent = '删除';
                actions.appendChild(deleteButton);
            }

            bindDemoEvents() {
                if (!this.isAuthenticated) return;

                const demoTabId = this.getTabId(this.demoPageName);
                const fileInput = document.getElementById(`${demoTabId}DemoFileInput`);
                const dropZone = document.getElementById(`${demoTabId}DemoDropZone`);
                const markdownButton = document.getElementById(`${demoTabId}DemoMarkdownButton`);
                if (!fileInput || !dropZone) return;

                const chooseFile = () => fileInput.click();
                dropZone.addEventListener('click', chooseFile);
                dropZone.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        chooseFile();
                    }
                });
                dropZone.addEventListener('dragover', (event) => {
                    event.preventDefault();
                    dropZone.classList.add('is-dragover');
                });
                dropZone.addEventListener('dragleave', () => {
                    dropZone.classList.remove('is-dragover');
                });
                dropZone.addEventListener('drop', (event) => {
                    event.preventDefault();
                    dropZone.classList.remove('is-dragover');
                    const file = event.dataTransfer?.files?.[0];
                    if (file) {
                        this.uploadDemoFile(file);
                    }
                });
                fileInput.addEventListener('change', () => {
                    const file = fileInput.files?.[0];
                    if (file) {
                        this.uploadDemoFile(file);
                        fileInput.value = '';
                    }
                });
                markdownButton?.addEventListener('click', () => this.uploadDemoMarkdown());

                document.querySelectorAll('[data-demo-action]').forEach(button => {
                    button.addEventListener('click', () => this.handleDemoAction(button));
                });

                document.querySelectorAll('[data-demo-title-input]').forEach(input => {
                    input.addEventListener('keydown', (event) => this.handleDemoTitleKeydown(event, input));
                    input.addEventListener('blur', () => this.saveDemoTitle(input));
                });

                document.querySelectorAll('[data-demo-feature-input]').forEach(input => {
                    input.addEventListener('keydown', (event) => this.handleDemoFeatureKeydown(event, input));
                    input.addEventListener('blur', () => this.saveDemoFeature(input));
                });
            }

            bindWikiEvents() {
                this.wikiPanel.bind();
                if (this.currentTab === this.wikiPageName) {
                    this.wikiPanel.loadFiles();
                }
            }

            handleDemoTitleKeydown(event, input) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    input.blur();
                    return;
                }
                if (event.key === 'Escape') {
                    event.preventDefault();
                    input.value = input.dataset.originalTitle || '';
                    input.blur();
                }
            }

            handleDemoFeatureKeydown(event, input) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    input.blur();
                    return;
                }
                if (event.key === 'Escape') {
                    event.preventDefault();
                    input.value = input.dataset.originalFeature || '';
                    input.blur();
                }
            }

            async handleDemoAction(button) {
                const slug = button.dataset.demoSlug;
                const action = button.dataset.demoAction;
                if (!slug || !action) return;

                if (action === 'delete') {
                    if (!confirm('确定删除这个演示吗？后端文件也会一起删除。')) return;
                    await this.deleteDemo(slug);
                    return;
                }

                await this.setDemoDisabled(slug, action === 'disable');
            }

            async restoreAuthSession() {
                if (await this.verifyDemoSession()) {
                    this.isAuthenticated = true;
                    this.updateAuthButton();
                    const preferredPage = this.routePageName || this.currentTab || this.privatePageName;
                    await this.loadDemos({ render: false });
                    this.renderVisiblePages(preferredPage);
                    this.syncUrlToCurrentTab({ replace: true });
                    return;
                }
                this.handleAuthExpired();
            }

            hasValidStoredAuthSession() {
                try {
                    const raw = localStorage.getItem(this.authSessionKey);
                    if (raw) {
                        const stored = JSON.parse(raw);
                        if (Number(stored.expiresAt) > Date.now()) {
                            return true;
                        }
                    }
                } catch (error) {
                    console.warn('Stored auth session is invalid', error);
                }

                this.clearStoredAuthSession();
                if (sessionStorage.getItem(this.authSessionKey) === 'true') {
                    this.storeAuthSession();
                    sessionStorage.removeItem(this.authSessionKey);
                    return true;
                }
                return false;
            }

            storeAuthSession() {
                try {
                    localStorage.setItem(
                        this.authSessionKey,
                        JSON.stringify({ expiresAt: Date.now() + this.authSessionDurationMs })
                    );
                } catch (error) {
                    console.warn('Unable to store auth session', error);
                }
            }

            clearStoredAuthSession() {
                try {
                    localStorage.removeItem(this.authSessionKey);
                } catch (error) {
                    console.warn('Unable to clear stored auth session', error);
                }
                sessionStorage.removeItem(this.authSessionKey);
            }

            async verifyDemoSession() {
                try {
                    const response = await fetch('/api/demo/session', { credentials: 'same-origin' });
                    return response.ok;
                } catch (error) {
                    console.warn('Demo session check unavailable', error);
                    return false;
                }
            }

            handleAuthExpired() {
                this.isAuthenticated = false;
                this.hasStoredAuthSession = false;
                this.isEditingRecommendations = false;
                this.demoItems = [];
                this.clearStoredAuthSession();
                this.updateAuthButton();
                const nextPage = [this.privatePageName, this.demoPageName, this.wikiPageName].includes(this.currentTab)
                    ? this.recommendationPageName
                    : this.currentTab;
                this.renderVisiblePages(nextPage);
                this.syncUrlToCurrentTab({ replace: true });
            }

            async loadDemos({ render = true } = {}) {
                if (!this.isAuthenticated) return;

                try {
                    const response = await fetch('/api/demos', { credentials: 'same-origin' });
                    if (response.status === 401) {
                        this.handleAuthExpired();
                        return;
                    }
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const payload = await response.json();
                    this.demoItems = Array.isArray(payload.demos) ? payload.demos : [];
                    if (render) {
                        this.renderVisiblePages(this.currentTab || this.privatePageName);
                    }
                } catch (error) {
                    console.warn('Demo list unavailable', error);
                    this.demoItems = [];
                    this.setDemoStatus('演示后台暂时不可用');
                }
            }

            async establishDemoSession(password) {
                try {
                    const response = await fetch('/api/demo/session', {
                        method: 'POST',
                        credentials: 'same-origin',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password })
                    });
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                } catch (error) {
                    console.warn('Demo session unavailable', error);
                }
            }

            async uploadDemoFile(file) {
                const demoTabId = this.getTabId(this.demoPageName);
                const titleInput = document.getElementById(`${demoTabId}DemoTitleInput`);
                const title = titleInput?.value.trim() || '';
                const formData = new FormData();
                formData.append('file', file);
                if (title) {
                    formData.append('title', title);
                }

                this.setDemoStatus('正在上传...');
                try {
                    const response = await fetch('/api/demos', {
                        method: 'POST',
                        credentials: 'same-origin',
                        body: formData
                    });
                    if (!response.ok) {
                        throw new Error(await this.readErrorMessage(response));
                    }
                    if (titleInput) titleInput.value = '';
                    this.setDemoStatus('已添加演示');
                    await this.loadDemos();
                    this.switchToPage(this.demoPageName);
                } catch (error) {
                    this.setDemoStatus(error.message || '上传失败');
                }
            }

            async uploadDemoMarkdown() {
                const demoTabId = this.getTabId(this.demoPageName);
                const titleInput = document.getElementById(`${demoTabId}DemoTitleInput`);
                const markdownInput = document.getElementById(`${demoTabId}DemoMarkdownInput`);
                const title = titleInput?.value.trim() || '';
                const content = markdownInput?.value.trim() || '';

                if (!content) {
                    this.setDemoStatus('请先粘贴 MD 内容');
                    markdownInput?.focus();
                    return;
                }

                this.setDemoStatus('正在添加 Markdown...');
                try {
                    const response = await fetch('/api/demos', {
                        method: 'POST',
                        credentials: 'same-origin',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, content })
                    });
                    if (!response.ok) {
                        throw new Error(await this.readErrorMessage(response));
                    }
                    if (titleInput) titleInput.value = '';
                    if (markdownInput) markdownInput.value = '';
                    this.setDemoStatus('已添加 Markdown 演示');
                    await this.loadDemos();
                    this.switchToPage(this.demoPageName);
                } catch (error) {
                    this.setDemoStatus(error.message || '添加失败');
                }
            }

            async setDemoDisabled(slug, disabled) {
                this.setDemoStatus(disabled ? '正在禁用...' : '正在启用...');
                try {
                    const response = await fetch(`/api/demos/${encodeURIComponent(slug)}`, {
                        method: 'PATCH',
                        credentials: 'same-origin',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ disabled })
                    });
                    if (!response.ok) {
                        throw new Error(await this.readErrorMessage(response));
                    }
                    this.setDemoStatus(disabled ? '已禁用' : '已启用');
                    await this.loadDemos();
                    this.switchToPage(this.demoPageName);
                } catch (error) {
                    this.setDemoStatus(error.message || '操作失败');
                }
            }

            async saveDemoTitle(input) {
                const slug = input.dataset.demoSlug;
                const originalTitle = input.dataset.originalTitle || '';
                const title = input.value.trim();
                if (!slug || input.dataset.saving === 'true') return;
                if (title === originalTitle) return;
                if (!title) {
                    input.value = originalTitle;
                    this.setDemoStatus('演示名称不能为空');
                    return;
                }

                input.dataset.saving = 'true';
                this.setDemoStatus('正在重命名...');
                try {
                    const response = await fetch(`/api/demos/${encodeURIComponent(slug)}`, {
                        method: 'PATCH',
                        credentials: 'same-origin',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title })
                    });
                    if (!response.ok) {
                        throw new Error(await this.readErrorMessage(response));
                    }
                    this.setDemoStatus('已重命名');
                    await this.loadDemos();
                    this.switchToPage(this.demoPageName);
                } catch (error) {
                    input.dataset.saving = 'false';
                    input.value = originalTitle;
                    this.setDemoStatus(error.message || '重命名失败');
                }
            }

            async saveDemoFeature(input) {
                const slug = input.dataset.demoSlug;
                const originalFeature = input.dataset.originalFeature || '';
                const feature = input.value.trim();
                if (!slug || input.dataset.saving === 'true') return;
                if (feature === originalFeature) return;

                input.dataset.saving = 'true';
                this.setDemoStatus('正在保存功能...');
                try {
                    const response = await fetch(`/api/demos/${encodeURIComponent(slug)}`, {
                        method: 'PATCH',
                        credentials: 'same-origin',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ feature })
                    });
                    if (!response.ok) {
                        throw new Error(await this.readErrorMessage(response));
                    }
                    this.setDemoStatus('已保存功能');
                    await this.loadDemos();
                    this.switchToPage(this.demoPageName);
                } catch (error) {
                    input.dataset.saving = 'false';
                    input.value = originalFeature;
                    this.setDemoStatus(error.message || '保存失败');
                }
            }

            async deleteDemo(slug) {
                this.setDemoStatus('正在删除...');
                try {
                    const response = await fetch(`/api/demos/${encodeURIComponent(slug)}`, {
                        method: 'DELETE',
                        credentials: 'same-origin'
                    });
                    if (!response.ok) {
                        throw new Error(await this.readErrorMessage(response));
                    }
                    this.setDemoStatus('已删除');
                    await this.loadDemos();
                    this.switchToPage(this.demoPageName);
                } catch (error) {
                    this.setDemoStatus(error.message || '删除失败');
                }
            }

            async readErrorMessage(response) {
                if (response.status === 401) {
                    this.handleAuthExpired();
                    return '登录已过期，请重新登录';
                }
                try {
                    const payload = await response.json();
                    return payload?.error?.message || `HTTP ${response.status}`;
                } catch {
                    return `HTTP ${response.status}`;
                }
            }

            setDemoStatus(message) {
                const demoTabId = this.getTabId(this.demoPageName);
                const status = document.getElementById(`${demoTabId}DemoStatus`);
                if (status) {
                    status.textContent = message;
                }
            }

            buildDemoPage() {
                const tools = this.demoItems.map(item => ({
                    "名称": item.title,
                    "地址": item.address,
                    "备注": item.disabled ? "已禁用" : "已启用",
                    "功能": item.feature || `${item.disabled ? '已禁用' : '已启用'} · ${this.getDemoKindLabel(item.kind)}`,
                    demoFeature: item.feature || '',
                    demoSlug: item.slug,
                    disabled: item.disabled
                }));

                return {
                    "类型": tools.length > 0 ? [{ "演示列表": tools }] : []
                };
            }

            getDemoKindLabel(kind) {
                const labels = {
                    html: 'HTML',
                    markdown: 'Markdown',
                    zip: 'ZIP'
                };
                return labels[kind] || '演示';
            }

            bindSearchEvents() {
                const searchTabId = this.getTabId(this.searchPageName);
                const searchInput = document.getElementById(`${searchTabId}SearchInput`);
                if (!searchInput) return;

                searchInput.value = this.searchQuery;
                searchInput.addEventListener('input', () => {
                    this.searchQuery = searchInput.value;
                    this.refreshSearchResults();
                });

                this.updateSearchStatus(this.countTools(this.buildSearchPage(this.getVisibleSourcePages(), this.searchQuery)));
            }

            refreshSearchResults() {
                const searchTabId = this.getTabId(this.searchPageName);
                const tableBodyId = `${searchTabId}TableBody`;
                const navListId = `${searchTabId}TypeNavList`;
                const pageData = this.buildSearchPage(this.getVisibleSourcePages(), this.searchQuery);

                this.generateTable(tableBodyId, navListId, pageData, this.searchPageName);
                this.updateSearchStatus(this.countTools(pageData));
                this.checkFunctionCellTruncation();
            }

            updateSearchStatus(resultCount) {
                const searchTabId = this.getTabId(this.searchPageName);
                const status = document.getElementById(`${searchTabId}SearchStatus`);
                if (!status) return;

                const query = this.searchQuery.trim();
                if (!query) {
                    status.textContent = '输入关键词开始搜索';
                    return;
                }

                status.textContent = resultCount > 0 ? `找到 ${resultCount} 个结果` : '没有匹配结果';
            }

            buildSearchPage(sourcePages, query = this.searchQuery) {
                const normalizedQuery = query.trim().toLowerCase();
                if (!normalizedQuery) {
                    return { "类型": [] };
                }

                const groups = [];
                Object.entries(sourcePages).forEach(([pageName, pageData]) => {
                    pageData['类型']?.forEach(categoryObj => {
                        const categoryName = Object.keys(categoryObj)[0];
                        const tools = categoryObj[categoryName] || [];
                        const matchedTools = tools.filter(tool => this.doesToolMatchQuery(tool, normalizedQuery));

                        if (matchedTools.length > 0) {
                            groups.push({
                                [`${pageName} · ${categoryName}`]: matchedTools
                            });
                        }
                    });
                });

                return { "类型": groups };
            }

            doesToolMatchQuery(tool, normalizedQuery) {
                const searchableText = [
                    tool['名称'],
                    tool['地址'],
                    this.getDisplayAddress(tool['地址'] || ''),
                    tool['备注'],
                    tool['功能']
                ].filter(Boolean).join(' ').toLowerCase();

                return searchableText.includes(normalizedQuery);
            }

            countTools(pageData) {
                return pageData['类型']?.reduce((total, categoryObj) => {
                    const tools = Object.values(categoryObj)[0] || [];
                    return total + tools.length;
                }, 0) || 0;
            }

            buildRecommendationPage(sourcePages) {
                const groups = [];

                Object.entries(sourcePages).forEach(([pageName, pageData]) => {
                    const recommendedTools = [];

                    pageData['类型']?.forEach(categoryObj => {
                        const categoryName = Object.keys(categoryObj)[0];
                        const tools = categoryObj[categoryName] || [];

                        tools.forEach(tool => {
                            if (this.isRecommended(tool)) {
                                recommendedTools.push({
                                    ...tool,
                                    "来源": `${pageName} · ${categoryName}`
                                });
                            }
                        });
                    });

                    if (recommendedTools.length > 0) {
                        groups.push({ [pageName]: recommendedTools });
                    }
                });

                if (groups.length === 0) {
                    groups.push({
                        "还没有推荐": [
                            {
                                "名称": "登录后给常用链接加推荐",
                                "地址": "#",
                                "备注": "本机保存",
                                "功能": "推荐列表会出现在第一个标签页，未登录也可以浏览。"
                            }
                        ]
                    });
                }

                return { "类型": groups };
            }

            loadRecommendationOverrides() {
                try {
                    return JSON.parse(localStorage.getItem(this.recommendationStorageKey) || '{}');
                } catch (error) {
                    console.error(error);
                    return {};
                }
            }

            saveRecommendationOverrides() {
                localStorage.setItem(
                    this.recommendationStorageKey,
                    JSON.stringify(this.recommendationOverrides)
                );
            }

            getToolKey(tool) {
                return `${tool['名称'] || ''}::${tool['地址'] || ''}`;
            }

            isRecommended(tool) {
                const key = this.getToolKey(tool);
                if (Object.prototype.hasOwnProperty.call(this.recommendationOverrides, key)) {
                    return this.recommendationOverrides[key] === true;
                }

                return tool['推荐'] === true;
            }

            toggleRecommendation(tool) {
                if (!this.isAuthenticated || !this.isEditingRecommendations) return;

                const key = this.getToolKey(tool);
                const nextValue = !this.isRecommended(tool);
                this.recommendationOverrides[key] = nextValue;
                this.saveRecommendationOverrides();
                this.syncRecommendationControls(key, nextValue);
                this.refreshRecommendationPageIfNeeded();
            }

            syncRecommendationControls(toolKey, isRecommended) {
                document.querySelectorAll(`.recommendation-toggle[data-tool-key="${CSS.escape(toolKey)}"]`).forEach(button => {
                    button.classList.toggle('is-active', isRecommended);
                    button.textContent = isRecommended ? '已推荐' : '推荐';
                    button.setAttribute('aria-pressed', String(isRecommended));
                    button.title = isRecommended ? '从推荐列表移除' : '加入推荐列表';
                });
            }

            refreshRecommendationPageIfNeeded() {
                const recommendationTabId = this.getTabId(this.recommendationPageName);
                const recommendationContent = document.getElementById(recommendationTabId);
                if (!recommendationContent) return;

                const tableBodyId = `${recommendationTabId}TableBody`;
                const navListId = `${recommendationTabId}TypeNavList`;
                const tableScroll = document.getElementById(tableBodyId)?.closest('.table-scroll');
                const scrollTop = tableScroll?.scrollTop || 0;

                this.generateTable(
                    tableBodyId,
                    navListId,
                    this.buildRecommendationPage(this.getVisibleSourcePages()),
                    this.recommendationPageName
                );

                if (tableScroll) {
                    tableScroll.scrollTop = scrollTop;
                }

                if (this.currentTab === this.recommendationPageName) {
                    this.checkFunctionCellTruncation();
                    this.bindTableScrollEvents();
                }
            }

            appendRecommendationControl(parent, tool, options = {}) {
                const isRecommended = this.isRecommended(tool);

                const tagClass = options.mobile ? 'mobile-tag tag-recommended' : 'recommendation-mark';

                if (!this.isEditingRecommendations) {
                    if (!isRecommended) return;

                    const mark = document.createElement('span');
                    mark.className = `${tagClass} is-active`;
                    mark.textContent = '推荐';
                    parent.appendChild(mark);
                    return;
                }

                if (!this.isAuthenticated) return;

                const button = document.createElement('button');
                button.type = 'button';
                button.className = `${options.mobile ? 'mobile-tag tag-recommended ' : ''}recommendation-toggle ${isRecommended ? 'is-active' : ''}`;
                button.textContent = isRecommended ? '已推荐' : '推荐';
                button.dataset.toolKey = this.getToolKey(tool);
                button.setAttribute('aria-pressed', String(isRecommended));
                button.title = isRecommended ? '从推荐列表移除' : '加入推荐列表';
                button.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    this.toggleRecommendation(tool);
                });
                parent.appendChild(button);
            }

            // 解析备注字段获取标签
            parseNoteTags(note, url = '') {
                const tags = [];
                const noteStr = note.toLowerCase();
                const urlStr = url.toLowerCase();

                // Netlify 和 Markdown 站点需要翻墙
                if (urlStr.includes('netlify') || urlStr.includes('markdown')) {
                    tags.push({ text: '翻墙', class: 'tag-vpn' });
                } else if (noteStr.includes('翻墙')) {
                    tags.push({ text: '翻墙', class: 'tag-vpn' });
                } else if (noteStr.includes('直连')) {
                    tags.push({ text: '直连', class: 'tag-free' });
                }

                if (noteStr.includes('免费')) {
                    tags.push({ text: '免费', class: 'tag-free' });
                } else if (noteStr.includes('付费')) {
                    tags.push({ text: '付费', class: 'tag-paid' });
                } else if (noteStr.includes('freemium')) {
                    tags.push({ text: 'Freemium', class: '' });
                }

                return tags;
            }

            // 滚动到指定类型
            scrollToType(type, navListId, tableBodyId) {
                // 检测是否为移动端视图
                const isMobile = window.innerWidth <= 768;

                if (isMobile) {
                    // 移动端：滚动到类型标题
                    const typeHeader = document.querySelector(`.mobile-type-header[data-type="${type}"]`);
                    if (!typeHeader) return;

                    const headerOffset = 130; // 留出顶部标签栏+类型导航栏空间
                    const elementPosition = typeHeader.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: 'smooth'
                    });
                } else {
                    // 桌面端：滚动表格
                    const typeCell = document.querySelector(`#${tableBodyId} td[data-type="${type}"]`);
                    if (!typeCell) return;

                    const tableScroll = typeCell.closest('.table-scroll');
                    const tableRect = tableScroll.getBoundingClientRect();
                    const cellRect = typeCell.getBoundingClientRect();
                    const headerHeight = tableScroll.querySelector('thead').getBoundingClientRect().height;

                    const scrollTop = tableScroll.scrollTop + (cellRect.top - tableRect.top) - headerHeight - 10;

                    tableScroll.scrollTo({
                        top: Math.max(0, scrollTop),
                        behavior: 'smooth'
                    });
                }

                this.updateActiveNavItem(type, navListId);
            }

            // 更新激活的导航项
            updateActiveNavItem(activeType, navListId) {
                const navList = document.getElementById(navListId);
                if (!navList) return;

                navList.querySelectorAll('.type-nav-item').forEach(item => {
                    item.classList.toggle('active', item.textContent === activeType);
                });
            }

            bindAuthEvents() {
                document.getElementById('authButton').addEventListener('click', () => {
                    if (this.isAuthenticated) {
                        this.logout();
                    } else {
                        this.openLogin();
                    }
                });

                document.getElementById('editModeButton').addEventListener('click', () => {
                    this.toggleEditMode();
                });

                document.getElementById('loginForm').addEventListener('submit', (event) => {
                    this.login(event);
                });

                document.querySelectorAll('[data-close-login]').forEach(element => {
                    element.addEventListener('click', () => this.closeLogin());
                });

                document.addEventListener('keydown', (event) => {
                    if (event.key === 'Escape') {
                        this.closeLogin();
                    }
                });
            }

            updateAuthButton() {
                document.getElementById('authButton').textContent = this.isAuthenticated ? '退出' : '登录';
                this.updateEditModeButton();
            }

            updateEditModeButton() {
                const editButton = document.getElementById('editModeButton');
                editButton.classList.toggle('hidden', !this.isAuthenticated);
                editButton.classList.toggle('is-active', this.isEditingRecommendations);
                editButton.textContent = this.isEditingRecommendations ? '完成' : '编辑';
                editButton.setAttribute('aria-pressed', String(this.isEditingRecommendations));
            }

            toggleEditMode() {
                if (!this.isAuthenticated) return;

                const tabId = this.getTabId(this.currentTab);
                const activeContent = document.getElementById(tabId);
                const tableScrollTop = activeContent?.querySelector('.table-scroll')?.scrollTop || 0;
                const windowScrollX = window.scrollX;
                const windowScrollY = window.scrollY;

                this.isEditingRecommendations = !this.isEditingRecommendations;
                this.updateEditModeButton();
                this.renderVisiblePages(this.currentTab);

                const restoredContent = document.getElementById(tabId);
                const restoredTableScroll = restoredContent?.querySelector('.table-scroll');
                if (restoredTableScroll) {
                    restoredTableScroll.scrollTop = tableScrollTop;
                }
                window.scrollTo(windowScrollX, windowScrollY);
            }

            openLogin() {
                const modal = document.getElementById('loginModal');
                const passwordInput = document.getElementById('loginPassword');
                document.getElementById('loginError').textContent = '';
                passwordInput.value = '';
                modal.classList.remove('hidden');
                passwordInput.focus();
            }

            closeLogin() {
                document.getElementById('loginModal').classList.add('hidden');
            }

            async login(event) {
                event.preventDefault();
                const configuredPassword = window.SITE_CONFIG?.privateArea?.password || '';
                const errorElement = document.getElementById('loginError');

                if (!configuredPassword) {
                    errorElement.textContent = '请先在配置文件中设置密码';
                    return;
                }

                const passwordInput = document.getElementById('loginPassword');
                if (passwordInput.value !== configuredPassword) {
                    errorElement.textContent = '密码错误';
                    passwordInput.select();
                    return;
                }

                this.isAuthenticated = true;
                this.hasStoredAuthSession = true;
                this.isEditingRecommendations = false;
                this.storeAuthSession();
                await this.establishDemoSession(passwordInput.value);
                await this.loadDemos();
                this.closeLogin();
                this.updateAuthButton();
                const visiblePages = this.getVisiblePages();
                const targetPage = this.routePageName && visiblePages[this.routePageName]
                    ? this.routePageName
                    : this.privatePageName;
                this.renderVisiblePages(targetPage);
                this.switchToPage(targetPage, { updateHistory: true });
            }

            logout() {
                this.isAuthenticated = false;
                this.hasStoredAuthSession = false;
                this.isEditingRecommendations = false;
                this.demoItems = [];
                this.clearStoredAuthSession();
                this.updateAuthButton();
                const nextPage = [this.privatePageName, this.demoPageName, this.wikiPageName].includes(this.currentTab)
                    ? this.recommendationPageName
                    : this.currentTab;
                this.renderVisiblePages(nextPage);
                this.syncUrlToCurrentTab({ replace: true });
            }

            // 站内路径补成线上可直接访问和分享的完整地址。
            getDisplayAddress(address) {
                return this.getAbsoluteAddress(address).replace(/^https:\/\//i, '');
            }

            getAbsoluteAddress(address) {
                const publicOrigin = window.SITE_CONFIG?.publicOrigin || window.location.origin;
                return address.startsWith('/')
                    ? new URL(address, publicOrigin).href
                    : address;
            }

            // 裸域名地址用于展示，点击访问时补上协议。
            getLinkAddress(address) {
                if (!address || address.startsWith('#')) {
                    return address;
                }

                const absoluteAddress = this.getAbsoluteAddress(address);
                if (/^[a-z][a-z0-9+.-]*:/i.test(absoluteAddress)) {
                    return absoluteAddress;
                }

                return `https://${absoluteAddress}`;
            }

            // 复制到剪贴板功能
            copyToClipboard(text, element) {
                // 创建临时输入框
                const tempInput = document.createElement('textarea');
                tempInput.value = text;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);

                // 显示复制提示
                this.showCopyTooltip(element);
            }

            // 显示复制提示框
            showCopyTooltip(element) {
                // 移除现有的提示框
                const existingTooltip = document.querySelector('.copy-tooltip');
                if (existingTooltip) {
                    existingTooltip.remove();
                }

                // 创建新的提示框
                const tooltip = document.createElement('div');
                tooltip.className = 'copy-tooltip';
                tooltip.textContent = '地址已收好';
                document.body.appendChild(tooltip);

                // 定位提示框
                const rect = element.getBoundingClientRect();
                tooltip.style.left = rect.left + 'px';
                tooltip.style.top = (rect.top - 40) + 'px';

                // 显示提示框
                setTimeout(() => {
                    tooltip.classList.add('show');
                }, 10);

                // 2秒后隐藏提示框
                setTimeout(() => {
                    tooltip.classList.remove('show');
                    setTimeout(() => {
                        if (tooltip.parentNode) {
                            tooltip.parentNode.removeChild(tooltip);
                        }
                    }, 300);
                }, 2000);
            }

            // 检测功能列文本是否被截断并添加truncated类
            checkFunctionCellTruncation() {
                document.querySelectorAll('.function-cell').forEach(cell => {
                    const textWrapper = cell.querySelector('.function-cell-text');
                    if (textWrapper && textWrapper.scrollWidth > textWrapper.clientWidth) {
                        cell.classList.add('truncated');
                    } else {
                        cell.classList.remove('truncated');
                    }
                });
            }

            // 创建悬浮提示元素
            createHoverTooltip() {
                if (this.hoverTooltip) return;
                this.hoverTooltip = document.createElement('div');
                this.hoverTooltip.className = 'hover-tooltip';
                document.body.appendChild(this.hoverTooltip);
            }

            // 显示悬浮提示
            showHoverTooltip(element, text, isFunction = false) {
                if (!this.hoverTooltip) this.createHoverTooltip();

                this.hoverTooltip.textContent = text;
                this.hoverTooltip.classList.toggle('function-tip', isFunction);

                const rect = element.getBoundingClientRect();
                this.hoverTooltip.style.left = rect.left + 'px';
                this.hoverTooltip.style.top = (rect.bottom + 4) + 'px';

                // 延迟显示以触发动画
                requestAnimationFrame(() => {
                    this.hoverTooltip.classList.add('show');
                });
            }

            // 隐藏悬浮提示
            hideHoverTooltip() {
                if (this.hoverTooltip) {
                    this.hoverTooltip.classList.remove('show');
                }
            }

            // 绑定悬浮提示事件（使用事件委托，只需绑定一次）
            bindTooltipEvents() {
                if (this.tooltipEventsBound) return;
                this.tooltipEventsBound = true;

                document.addEventListener('mouseover', (e) => {
                    // 名称列链接 - 点击打开
                    const link = e.target.closest('.name-cell a');
                    if (link) {
                        this.showHoverTooltip(link, '点击打开');
                        return;
                    }

                    // 地址列 - 点击复制
                    const addressCell = e.target.closest('.address-cell');
                    if (addressCell) {
                        this.showHoverTooltip(addressCell, '点击复制');
                        return;
                    }

                    // 功能列 - 被截断时显示全文
                    const functionCell = e.target.closest('.function-cell');
                    if (functionCell && functionCell.classList.contains('truncated')) {
                        const fullText = functionCell.getAttribute('data-full-text');
                        if (fullText) {
                            this.showHoverTooltip(functionCell, fullText, true);
                        }
                    }
                });

                document.addEventListener('mouseout', (e) => {
                    const target = e.target.closest('.name-cell a, .address-cell, .function-cell');
                    if (target) {
                        this.hideHoverTooltip();
                    }
                });
            }

            bindTableScrollEvents() {
                document.querySelectorAll('.table-scroll').forEach(tableScroll => {
                    if (tableScroll.dataset.scrollBound === 'true') return;
                    tableScroll.dataset.scrollBound = 'true';

                    tableScroll.addEventListener('scroll', () => {
                        const tableRect = tableScroll.getBoundingClientRect();
                        let currentVisibleType = null;
                        let minDistance = Infinity;

                        tableScroll.querySelectorAll('td[data-type]').forEach(typeCell => {
                            const cellRect = typeCell.getBoundingClientRect();
                            const distance = Math.abs(cellRect.top - tableRect.top);
                            if (distance < minDistance) {
                                minDistance = distance;
                                currentVisibleType = typeCell.getAttribute('data-type');
                            }
                        });

                        if (currentVisibleType) {
                            const navListId = tableScroll.closest('.tab-content').querySelector('.type-nav-list').id;
                            this.updateActiveNavItem(currentVisibleType, navListId);
                        }
                    });
                });
            }
        }

        // 页面加载完成后初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            window.AIWebpagesApp = new AIWebpagesApp();

            // 初始检测功能列文本截断
            window.AIWebpagesApp.checkFunctionCellTruncation();

            // 绑定悬浮提示事件
            window.AIWebpagesApp.bindTooltipEvents();

            // 窗口大小改变时重新检测
            window.addEventListener('resize', () => {
                window.AIWebpagesApp.checkFunctionCellTruncation();
            });

        });
    </script>
</body>
</html>
