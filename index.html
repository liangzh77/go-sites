                    this.files = Array.isArray(payload.files) ? payload.files : [];
                    this.folders = Array.isArray(payload.folders) ? payload.folders : [];
                    this.files.sort((a, b) => a.path.localeCompare(b.path, 'zh-CN'));
                    this.folders.sort((a, b) => a.path.localeCompare(b.path, 'zh-CN'));
                    this.restoreHistory();
                    this.renderTree();
                    const current = this.currentHistoryItem();
                    const selected = this.loadSelectedPath();
                    if (current && this.itemExists(current)) {
                        await this.openHistoryItem(current, { record: false, restoreScroll: true });
                    } else if (selected && this.files.some(file => file.path === selected)) {
                        await this.openFile(selected, { record: true, restoreScroll: true });
                    } else if (this.files.length) {
                        await this.openFile(this.files[0].path, { record: true, restoreScroll: true });
                    } else {
                        this.renderEmpty('没有找到 Markdown 文件。');
                    }
                    this.setStatus(this.files.length ? `${this.files.length} 个文件` : '没有文件');
                } catch (error) {
                    this.renderEmpty(error.message || '加载 wiki 失败。');
                    this.setStatus(error.message || '加载失败');
                }
            }

            async api(path, options = {}) {
                const response = await fetch(path, { credentials: 'same-origin', ...options });
                const text = await response.text();
                let payload = {};
                if (text) {
                    try {
                        payload = JSON.parse(text);
                    } catch (error) {
                        payload = { error: text };
                    }
                }
                if (!response.ok) {
                    throw new Error(payload?.error?.message || payload.message || `HTTP ${response.status}`);
                }
                return payload;
            }

            renderTree(options = {}) {
                if (!this.treeEl) return;
                const hasRenderedTree = this.treeEl.children.length > 0;
                const previousScrollTop = hasRenderedTree ? this.treeEl.scrollTop : (this.treeState.scrollTop || 0);
                const root = this.createTreeNode('wiki', '');
                for (const folder of this.folders) {
                    this.addTreeFolder(root, String(folder.path || '').split('/').filter(Boolean));
                }
                for (const file of this.files) {
                    this.addTreeFile(root, file.path.split('/'), file);
                }
                this.treeEl.replaceChildren(this.renderTreeFolder(root));
                this.treeEl.scrollTop = previousScrollTop;
                if (options.revealCurrent) this.revealCurrentTreeItem();
                this.syncMobileTreeUi();
            }

            createTreeNode(name, path = '') {
                return { name, path, folders: new Map(), files: [] };
            }

            addTreeFolder(root, parts) {
                let node = root;
                const current = [];
                for (const part of parts) {
                    current.push(part);
                    if (!node.folders.has(part)) node.folders.set(part, this.createTreeNode(part, current.join('/')));
                    node = node.folders.get(part);
                }
            }

            addTreeFile(root, parts, file) {
                let node = root;
                const current = [];
                for (const part of parts.slice(0, -1)) {
                    current.push(part);
                    if (!node.folders.has(part)) node.folders.set(part, this.createTreeNode(part, current.join('/')));
                    node = node.folders.get(part);
                }
                node.files.push(file);
            }

            renderTreeFolder(node) {
                const folderPath = node.path || 'root';
                const details = document.createElement('details');
                details.className = 'wiki-folder';
                details.dataset.folderPath = node.path || '';
                details.open = Object.prototype.hasOwnProperty.call(this.treeState.folderOpen, folderPath)
                    ? this.treeState.folderOpen[folderPath]
                    : true;
                const summary = document.createElement('summary');
                const title = document.createElement('span');
                title.className = 'wiki-folder-title';
                title.textContent = node.name;
                const addButton = document.createElement('button');
                addButton.type = 'button';
                addButton.className = 'wiki-add-button';
                addButton.textContent = '+';
                addButton.title = '在这个文件夹中新建';
                addButton.setAttribute('aria-label', `在 ${node.name} 中新建`);
                addButton.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    this.toggleCreateMenu(node.path || '');
                });
                const deleteButton = node.path ? this.renderDeleteButton('folder', node.path, `删除 ${node.name}`) : null;
                summary.append(title);
                if (this.editMode && this.pendingCreateFolder === (node.path || '')) {
                    summary.appendChild(this.renderCreateMenu(node.path || ''));
                } else {
                    summary.appendChild(addButton);
                }
                if (deleteButton) summary.appendChild(deleteButton);
                this.bindFolderDrop(details, node.path || '');
                details.appendChild(summary);
                summary.addEventListener('click', () => {
                    details.dataset.userToggle = 'true';
                });
                summary.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' || event.key === ' ') details.dataset.userToggle = 'true';
                });
                details.addEventListener('toggle', () => {
                    if (details.dataset.userToggle !== 'true') return;
                    delete details.dataset.userToggle;
                    this.treeState.folderOpen[folderPath] = details.open;
                    this.saveTreeState();
                });
                const children = document.createElement('div');
                children.className = 'wiki-folder-children';
                for (const child of [...node.folders.values()].sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'))) {
                    children.appendChild(this.renderTreeFolder(child));
                }
                for (const file of node.files.sort((a, b) => this.fileTitle(a).localeCompare(this.fileTitle(b), 'zh-CN'))) {
                    const row = document.createElement('div');
                    row.className = 'wiki-page-row';
                    row.dataset.wikiFilePath = file.path;
                    row.draggable = this.editMode;
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'wiki-page-item';
                    button.dataset.wikiFilePath = file.path;
                    button.setAttribute('aria-pressed', String(file.path === this.currentPath));
                    const title = document.createElement('span');
                    title.textContent = this.fileTitle(file);
                    button.title = file.path;
                    button.append(title);
                    button.addEventListener('click', async () => {
                        await this.openFile(file.path, { record: true, restoreScroll: true });
                        if (this.currentPath === file.path) this.setMobileTreeCollapsed(true);
                    });
                    row.addEventListener('dragstart', (event) => this.startFileDrag(event, file.path));
                    row.addEventListener('dragend', () => { this.draggingPath = ''; });
                    this.bindFileDrop(row, file.path);
                    row.append(button, this.renderDeleteButton('file', file.path, `删除 ${this.fileTitle(file)}`));
                    children.appendChild(row);
                }
                if (!node.folders.size && !node.files.length) {
                    const empty = document.createElement('p');
                    empty.className = 'wiki-empty';
                    empty.textContent = this.editMode ? '点上面的 + 添加文件或文件夹。' : '空目录。';
                    children.appendChild(empty);
                }
                details.appendChild(children);
                return details;
            }

            revealCurrentTreeItem() {
                const selected = this.treeEl?.querySelector(`.wiki-page-item[data-wiki-file-path="${CSS.escape(this.currentPath)}"]`);
                if (!selected) return;
                let parent = selected.parentElement;
                while (parent && parent !== this.treeEl) {
                    if (parent.matches?.('details.wiki-folder') && !parent.open) return;
                    parent = parent.parentElement;
                }
                if (selected.offsetParent === null) return;
                selected.scrollIntoView({ block: 'nearest', inline: 'nearest' });
                this.treeState.scrollTop = this.treeEl.scrollTop;
                this.saveTreeState();
            }

            async openFile(path, options = {}) {
                if (this.isEditingContent) {
                    const saved = await this.finishContentEdit({ save: true, render: false });
                    if (!saved) return;
                }
                this.rememberCurrentScroll();
                let file = this.files.find(item => item.path === path);
                if (!file) return;
                file = await this.ensureWikiFileLoaded(file);
                const searchQuery = String(options.searchQuery || '').trim();
                const historyItem = { type: 'file', id: path };
                if (searchQuery) historyItem.searchQuery = searchQuery;
                if (options.record !== false) this.recordHistory(historyItem);
                this.currentPath = path;
                this.saveSelectedPath(path);
                this.renderTree({ revealCurrent: Boolean(options.revealInTree) });
                if (this.titleEl) this.titleEl.textContent = this.fileTitle(file);
                this.pathEl.textContent = file.path;
                if (this.editMode) {
                    this.renderMarkdownEditor(file);
                } else {
                    this.setContentEditingState(false);
                    this.contentEl.innerHTML = this.renderMarkdownFile(file);
                    this.wireHeadingToggles();
                    this.wireRenderedMarkdownAssets();
                    this.wireListToggles();
                    this.syncContentFoldButtons();
                    this.wireInternalLinks();
                }
                if (!this.editMode && searchQuery) {
                    this.highlightSearchMatches(searchQuery);
                } else if (!this.editMode) {
                    this.clearSearchDisplay();
                }
                window.requestAnimationFrame(() => {
                    if (options.restoreScroll !== false) {
                        const saved = this.scrollPositions[this.scrollIdentity(historyItem)];
                        if (Number.isFinite(saved)) {
                            this.contentEl.scrollTop = saved;
                        }
                    }
                });
                this.updateHistoryButtons();
            }

            async toggleEditMode() {
                if (this.editMode) {
                    const saved = await this.finishContentEdit({ save: true, render: true });
                    if (!saved) return;
                    this.editMode = false;
                    this.pendingCreateFolder = null;
                    this.syncEditModeUi();
                    this.renderTree();
                    return;
                }
                this.editMode = true;
                this.syncEditModeUi();
                this.renderTree();
                await this.startContentEdit();
            }

            syncEditModeUi() {
                this.root?.classList.toggle('wiki-editor-enabled', this.editMode);
                if (this.editModeBtn) {
                    this.editModeBtn.setAttribute('aria-pressed', String(this.editMode));
                    this.editModeBtn.textContent = this.editMode ? '完成' : '编辑';
                }
                this.syncContentFoldButtons();
            }

            toggleCreateMenu(parentPath) {
                if (!this.editMode) return;
                this.pendingDelete = null;
                this.pendingCreateFolder = this.pendingCreateFolder === parentPath ? null : parentPath;
                this.renderTree();
            }

            clearCreateMenu() {
                if (this.pendingCreateFolder === null) return;
                this.pendingCreateFolder = null;
                this.renderTree();
            }

            renderCreateMenu(parentPath) {
                const menu = document.createElement('span');
                menu.className = 'wiki-create-menu';
                menu.dataset.wikiCreateAction = 'menu';
                const fileButton = document.createElement('button');
                fileButton.type = 'button';
                fileButton.className = 'wiki-create-choice';
                fileButton.textContent = '文件';
                fileButton.dataset.wikiCreateAction = 'file';
                fileButton.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    this.createEntryInFolder(parentPath, 'file');
                });
                const folderButton = document.createElement('button');
                folderButton.type = 'button';
                folderButton.className = 'wiki-create-choice';
                folderButton.textContent = '文件夹';
                folderButton.dataset.wikiCreateAction = 'folder';
                folderButton.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    this.createEntryInFolder(parentPath, 'folder');
                });
                menu.append(fileButton, folderButton);
                return menu;
            }

            async createEntryInFolder(parentPath, kind) {
                if (!this.editMode) return;
                const isFolder = kind === 'folder';
                const name = window.prompt(isFolder ? '文件夹名称' : 'Markdown 文件名称');
                if (!name || !name.trim()) return;
                try {
                    this.pendingCreateFolder = null;
                    if (isFolder) {
                        const created = await this.createWikiFolder(parentPath, name.trim());
                        this.upsertWikiFolder(created);
                        this.renderTree();
                    } else {
                        const created = await this.createWikiFile(parentPath, name.trim());
                        this.upsertWikiFile(created);
                        this.renderTree({ revealCurrent: true });
                        await this.openFile(created.path, { record: true, restoreScroll: false });
                        return;
                    }
                    this.setSaveStatus('已创建');
                } catch (error) {
                    window.alert(error.message || '创建失败');
                }
            }

            async createWikiFile(parentPath, name) {
                return this.api('/api/wiki/files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parent: parentPath || '', name }),
                });
            }

            async createWikiFolder(parentPath, name) {
                return this.api('/api/wiki/folders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parent: parentPath || '', name }),
                });
            }

            bindFolderDrop(element, folderPath) {
                element.addEventListener('dragover', (event) => {
                    if (!this.editMode) return;
                    if (this.hasExternalFiles(event)) {
                        event.preventDefault();
                        element.classList.add('wiki-drop-target');
                        event.dataTransfer.dropEffect = 'copy';
                        return;
                    }
                    const source = this.dragPathFromEvent(event);
                    if (!source || this.parentFolder(source) === folderPath) return;
                    event.preventDefault();
                    element.classList.add('wiki-drop-target');
                    event.dataTransfer.dropEffect = 'move';
                });
                element.addEventListener('dragleave', () => element.classList.remove('wiki-drop-target'));
                element.addEventListener('drop', async (event) => {
                    if (!this.editMode) return;
                    if (this.hasExternalFiles(event)) {
                        event.preventDefault();
                        event.stopPropagation();
                        element.classList.remove('wiki-drop-target');
                        await this.uploadExternalFiles(event.dataTransfer.files, folderPath);
                        return;
                    }
                    const source = this.dragPathFromEvent(event);
                    if (!source || this.parentFolder(source) === folderPath) return;
                    event.preventDefault();
                    event.stopPropagation();
                    element.classList.remove('wiki-drop-target');
                    await this.moveWikiFile(source, folderPath);
                });
            }

            bindFileDrop(element, filePath) {
                element.addEventListener('dragover', (event) => {
                    if (!this.editMode) return;
                    if (this.hasExternalFiles(event)) {
                        event.preventDefault();
                        element.classList.add('wiki-drop-target');
                        event.dataTransfer.dropEffect = 'copy';
                        return;
                    }
                    const source = this.dragPathFromEvent(event);
                    const targetFolder = this.parentFolder(filePath);
                    if (!source || source === filePath || this.parentFolder(source) === targetFolder) return;
                    event.preventDefault();
                    element.classList.add('wiki-drop-target');
                    event.dataTransfer.dropEffect = 'move';
                });
                element.addEventListener('dragleave', () => element.classList.remove('wiki-drop-target'));
                element.addEventListener('drop', async (event) => {
                    if (!this.editMode) return;
                    if (this.hasExternalFiles(event)) {
                        event.preventDefault();
                        event.stopPropagation();
                        element.classList.remove('wiki-drop-target');
                        await this.uploadExternalFiles(event.dataTransfer.files, this.parentFolder(filePath));
                        return;
                    }
                    const source = this.dragPathFromEvent(event);
                    const targetFolder = this.parentFolder(filePath);
                    if (!source || source === filePath || this.parentFolder(source) === targetFolder) return;
                    event.preventDefault();
                    event.stopPropagation();
                    element.classList.remove('wiki-drop-target');
                    await this.moveWikiFile(source, targetFolder);
                });
            }

            startFileDrag(event, path) {
                if (!this.editMode) {
                    event.preventDefault();
                    return;
                }
                this.draggingPath = path;
                const link = this.markdownLinkFor(path);
                event.dataTransfer.effectAllowed = 'copyMove';
                event.dataTransfer.setData('application/x-wiki-path', path);
                event.dataTransfer.setData('text/plain', link);
            }

            dragPathFromEvent(event) {
                return event?.dataTransfer?.getData('application/x-wiki-path') || this.draggingPath || '';
            }

            hasExternalFiles(event) {
                const types = Array.from(event?.dataTransfer?.types || []);
                return types.includes('Files') || Boolean(event?.dataTransfer?.files?.length);
            }

            async uploadExternalFiles(fileList, targetFolder) {
                const files = Array.from(fileList || []).filter(file => file && file.name);
                if (!files.length) return;
                const unsupported = files.filter(file => !this.isDisplayableWikiFile(file.name));
                if (unsupported.length) {
                    window.alert('只能添加 Markdown 文件（.md / .markdown）。');
                    return;
                }
                const form = new FormData();
                form.append('parent', targetFolder || '');
                for (const file of files) form.append('files', file, file.name);
                try {
                    await this.api('/api/wiki/upload', {
                        method: 'POST',
                        body: form,
                    });
                    await this.refreshWikiIndex();
                } catch (error) {
                    window.alert(error.message || '上传失败');
                }
            }

            isDisplayableWikiFile(name) {
                return /\.(md|markdown)$/i.test(String(name || '').trim());
            }

            async refreshWikiIndex(options = {}) {
                const payload = await this.api('/api/wiki/files');
                this.files = Array.isArray(payload.files) ? payload.files : [];
                this.folders = Array.isArray(payload.folders) ? payload.folders : [];
                this.files.sort((a, b) => a.path.localeCompare(b.path, 'zh-CN'));
                this.folders.sort((a, b) => a.path.localeCompare(b.path, 'zh-CN'));
                this.renderTree(options);
            }

            async ensureWikiFileLoaded(fileOrPath, options = {}) {
                const path = typeof fileOrPath === 'string' ? fileOrPath : fileOrPath?.path;
                if (!path) return null;
                const existing = this.files.find(item => item.path === path);
                const wantsRendered = options.render !== false;
                const hasSource = Boolean(existing?._sourceLoaded) || typeof existing?.content === 'string';
                const hasRendered = Boolean(existing?._htmlLoaded) || Boolean(String(existing?.html || '').trim());
                if (existing && hasSource && (!wantsRendered || hasRendered)) {
                    return existing;
                }
                const query = wantsRendered ? '' : '?render=false';
                const loaded = await this.api(`/api/wiki/files/${this.encodePath(path)}${query}`);
                loaded._sourceLoaded = true;
                loaded._htmlLoaded = wantsRendered;
                this.upsertWikiFile(loaded);
                return this.files.find(item => item.path === loaded.path) || loaded;
            }

            upsertWikiFile(file) {
                if (!file?.path) return;
                const index = this.files.findIndex(item => item.path === file.path);
                if (index >= 0) {
                    this.files[index] = { ...this.files[index], ...file };
                } else {
                    this.files.push(file);
                }
                this.files.sort((a, b) => a.path.localeCompare(b.path, 'zh-CN'));
            }

            upsertWikiFolder(folder) {
                if (!folder?.path) return;
                if (!this.folders.some(item => item.path === folder.path)) {
                    this.folders.push(folder);
                    this.folders.sort((a, b) => a.path.localeCompare(b.path, 'zh-CN'));
                }
            }

            async moveWikiFile(path, targetFolder) {
                try {
                    const moved = await this.api('/api/wiki/move', {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path, targetFolder: targetFolder || '' }),
                    });
                    await this.refreshWikiIndex();
                    await this.openFile(moved.path, { record: true, restoreScroll: false });
                    this.setSaveStatus('已移动');
                } catch (error) {
                    window.alert(error.message || '移动失败');
                }
            }

            renderDeleteButton(kind, path, label) {
                const button = document.createElement('button');
                const key = this.deleteKey(kind, path);
                const confirming = this.pendingDelete === key;
                button.type = 'button';
                button.className = `wiki-delete-button${confirming ? ' is-confirming' : ''}`;
                button.dataset.wikiDeleteAction = kind;
                button.textContent = confirming ? '确认' : '×';
                button.title = confirming ? '再次点击确认删除' : label;
                button.setAttribute('aria-label', button.title);
                button.addEventListener('click', async (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    if (this.pendingDelete === key) {
                        await this.deleteWikiEntry(kind, path);
                        return;
                    }
                    this.pendingDelete = key;
                    this.renderTree();
                });
                return button;
            }

            deleteKey(kind, path) {
                return `${kind}:${path}`;
            }

            clearDeleteConfirm() {
                if (!this.pendingDelete) return;
                this.pendingDelete = null;
                this.renderTree();
            }

            async deleteWikiEntry(kind, path) {
                try {
                    if (this.isEditingContent && (kind === 'folder' ? this.currentPath.startsWith(`${path}/`) : this.currentPath === path)) {
                        this.isEditingContent = false;
                        this.editTextarea = null;
                    }
                    const endpoint = kind === 'folder'
                        ? `/api/wiki/folders/${this.encodePath(path)}`
                        : `/api/wiki/files/${this.encodePath(path)}`;
                    await this.api(endpoint, { method: 'DELETE' });
                    this.pendingDelete = null;
                    const deletedCurrent = kind === 'folder'
                        ? this.currentPath === path || this.currentPath.startsWith(`${path}/`)
                        : this.currentPath === path;
                    if (deletedCurrent) {
                        this.currentPath = '';
                        this.saveSelectedPath('');
                    }
                    await this.loadFiles({ force: true });
                } catch (error) {
                    window.alert(error.message || '删除失败');
                }
            }

            async startContentEdit() {
                if (this.isEditingContent || !this.currentPath) return;
                let file = this.files.find(item => item.path === this.currentPath);
                if (!file) return;
                const scrollRatio = this.contentScrollRatio(this.contentEl);
                if (!this.editMode) {
                    this.editMode = true;
                    this.syncEditModeUi();
                    this.renderTree();
                }
                if (typeof file.content !== 'string') {
                    this.setContentEditingState(false);
                    this.contentEl.innerHTML = '<p class="wiki-empty">正在加载源码...</p>';
                    this.setSaveStatus('正在加载源码...');
                }
                file = await this.ensureWikiFileLoaded(file, { render: false });
                this.isEditingContent = true;
                this.setSaveStatus('正在编辑');
                this.renderMarkdownEditor(file, { scrollRatio });
            }

            renderMarkdownEditor(file, options = {}) {
                const textarea = document.createElement('textarea');
                textarea.className = 'wiki-markdown-editor';
                textarea.value = file.content || '';
                textarea.setAttribute('aria-label', `${this.fileTitle(file)} Markdown 源码`);
                textarea.addEventListener('dragover', (event) => {
                    const path = this.dragPathFromEvent(event);
                    if (!path) return;
                    event.preventDefault();
                    event.dataTransfer.dropEffect = 'copy';
                });
                textarea.addEventListener('drop', (event) => {
                    const path = this.dragPathFromEvent(event);
                    if (!path) return;
                    event.preventDefault();
                    this.insertLinkAtCursor(path);
                });
                this.setContentEditingState(true);
                this.contentEl.replaceChildren(textarea);
                this.editTextarea = textarea;
                this.isEditingContent = true;
                this.syncContentFoldButtons();
                this.restoreEditorScroll(textarea, options.scrollRatio, options.focus !== false && this.shouldAutoFocusEditor());
            }

            setContentEditingState(editing) {
                this.contentEl?.classList.toggle('is-editing', Boolean(editing));
            }

            shouldAutoFocusEditor() {
                const coarsePointer = window.matchMedia?.('(pointer: coarse)')?.matches;
                return !coarsePointer;
            }

            restoreEditorScroll(textarea, ratio, shouldFocus) {
                const restore = () => this.applyScrollRatio(textarea, ratio);
                window.requestAnimationFrame(() => {
                    restore();
                    if (shouldFocus) {
                        try {
                            textarea.focus({ preventScroll: true });
                        } catch (error) {
                            textarea.focus();
                        }
                        restore();
                    }
                    window.requestAnimationFrame(restore);
                    window.setTimeout(restore, 120);
                    window.setTimeout(restore, 350);
                });
            }

            async finishContentEdit(options = {}) {
                if (!this.isEditingContent) return true;
                const textarea = this.editTextarea;
                const file = this.files.find(item => item.path === this.currentPath);
                const shouldRender = options.render !== false;
                const scrollRatio = this.contentScrollRatio(textarea);
                if (!textarea || !file) {
                    this.isEditingContent = false;
                    this.editTextarea = null;
                    return true;
                }
                if (options.save === false || textarea.value === (file.content || '')) {
                    this.isEditingContent = false;
                    this.editTextarea = null;
                    if (shouldRender) {
                        this.setContentEditingState(false);
                        this.contentEl.innerHTML = this.renderMarkdownFile(file);
                        this.wireHeadingToggles();
                        this.wireRenderedMarkdownAssets();
                        this.wireListToggles();
                        this.syncContentFoldButtons();
                        this.wireInternalLinks();
                        this.restoreRenderedScroll(scrollRatio);
                    }
                    this.setSaveStatus('');
                    return true;
                }
                this.setSaveStatus('保存中...');
                try {
                    const saved = await this.api(`/api/wiki/files/${this.encodePath(file.path)}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: textarea.value }),
                    });
                    this.upsertWikiFile(saved);
                    this.isEditingContent = false;
                    this.editTextarea = null;
                    if (this.titleEl) this.titleEl.textContent = this.fileTitle(saved);
                    if (shouldRender) {
                        this.setContentEditingState(false);
                        this.contentEl.innerHTML = this.renderMarkdownFile(saved);
                        this.wireHeadingToggles();
                        this.wireRenderedMarkdownAssets();
                        this.wireListToggles();
                        this.syncContentFoldButtons();
                        this.wireInternalLinks();
                        this.restoreRenderedScroll(scrollRatio);
                    }
                    this.renderTree();
                    this.setSaveStatus('已保存');
                    return true;
                } catch (error) {
                    this.setSaveStatus('保存失败');
                    window.alert(error.message || '保存失败');
                    textarea.focus();
                    return false;
                }
            }

            insertLinkAtCursor(path) {
                if (!this.editTextarea) return;
                const link = this.markdownLinkFor(path);
                const textarea = this.editTextarea;
                const start = textarea.selectionStart ?? textarea.value.length;
                const end = textarea.selectionEnd ?? start;
                textarea.value = `${textarea.value.slice(0, start)}${link}${textarea.value.slice(end)}`;
                const next = start + link.length;
                textarea.focus();
                textarea.setSelectionRange(next, next);
                this.setSaveStatus('已插入链接');
            }

            markdownLinkFor(path) {
                const file = this.files.find(item => item.path === path);
                const label = this.fileTitle(file) || path.split('/').pop();
                return `[${label}](${this.relativePathFromCurrent(path)})`;
            }

            relativePathFromCurrent(targetPath) {
                const from = this.currentPath.includes('/') ? this.currentPath.split('/').slice(0, -1) : [];
                const to = String(targetPath || '').split('/').filter(Boolean);
                while (from.length && to.length && from[0] === to[0]) {
                    from.shift();
                    to.shift();
                }
                return [...from.map(() => '..'), ...to].join('/') || targetPath;
            }

            parentFolder(path) {
                const parts = String(path || '').split('/');
                parts.pop();
                return parts.join('/');
            }

            encodePath(path) {
                return String(path || '').split('/').map(part => encodeURIComponent(part)).join('/');
            }

            setSaveStatus(message) {
                if (this.saveStatusEl) this.saveStatusEl.textContent = '';
            }

            async runSearch() {
                const query = this.searchQuery.trim();
                if (!query) {
                    this.setStatus(this.files.length ? `${this.files.length} 个文件` : '');
                    const current = this.currentHistoryItem();
                    if (current?.type === 'file') {
                        this.openFile(current.id, { record: false, restoreScroll: true });
                    }
                    return;
                }
                await this.ensureWikiSearchContentLoaded(query);
                if (query !== this.searchQuery.trim()) return;
                const lower = query.toLowerCase();
                const results = this.files
                    .map(file => {
                        const haystack = [this.fileTitle(file), file.path, file.content || ''].join('\n');
                        if (!haystack.toLowerCase().includes(lower)) return null;
                        return { file, snippet: this.searchSnippet(haystack, query) };
                    })
                    .filter(Boolean);
                this.setStatus(`${results.length} 个匹配结果`);
                this.renderSearchResults(results, query);
            }

            async ensureWikiSearchContentLoaded(query) {
                const lower = query.toLowerCase();
                const missing = this.files.filter(file => {
                    const metadata = [this.fileTitle(file), file.path].join('\n').toLowerCase();
                    return !metadata.includes(lower) && typeof file.content !== 'string';
                });
                if (!missing.length) return;
                this.setStatus('正在搜索正文...');
                await Promise.all(missing.map(file => this.ensureWikiFileLoaded(file, { render: false }).catch(() => null)));
            }

            renderSearchResults(results, query) {
                this.titleEl.textContent = '搜索结果';
                this.pathEl.textContent = query;
                this.currentPath = '';
                this.setContentEditingState(false);
                if (!results.length) {
                    this.contentEl.innerHTML = `<p class="wiki-empty">没有找到包含“${this.escapeHtml(query)}”的文件。</p>`;
                    this.syncContentFoldButtons();
                    return;
                }
                this.contentEl.innerHTML = `<div class="wiki-search-results">${results.map(({ file, snippet }) => `
                    <button class="wiki-search-result" type="button" data-wiki-result="${this.escapeHtml(file.path)}">
                        <strong>${this.escapeHtml(this.fileTitle(file))}</strong>
                        <small>${this.escapeHtml(file.path)}</small>
                        <p>${snippet || '文件名或路径包含关键词。'}</p>
                    </button>
                `).join('')}</div>`;
                this.contentEl.querySelectorAll('[data-wiki-result]').forEach(button => {
                    button.addEventListener('click', () => {
                        this.recordHistory(this.currentSearchHistoryItem());
                        this.openFile(button.dataset.wikiResult, { record: true, searchQuery: query, restoreScroll: true });
                    });
                });
                this.syncContentFoldButtons();
            }

            recordHistory(item) {
                const normalized = this.normalizeHistoryItem(item);
                const current = this.currentHistoryItem();
                if (current && this.isSameHistoryItem(current, normalized)) {
                    this.saveHistory();
                    this.updateHistoryButtons();
                    return;
                }
                this.history = this.history.slice(0, this.historyIndex + 1);
                this.history.push(normalized);
                if (this.history.length > this.historyLimit) this.history = this.history.slice(-this.historyLimit);
                this.historyIndex = this.history.length - 1;
                this.saveHistory();
                this.updateHistoryButtons();
            }

            normalizeHistoryItem(item) {
                if (item.type === 'search') {
                    const query = String(item.query || '').trim();
                    return { type: 'search', id: `search:${query}`, query };
                }
                const normalized = { type: 'file', id: item.id };
                const searchQuery = String(item.searchQuery || '').trim();
                if (searchQuery) normalized.searchQuery = searchQuery;
                return normalized;
            }

            currentSearchHistoryItem() {
                return this.normalizeHistoryItem({ type: 'search', query: this.searchQuery });
            }

            currentHistoryItem() {
                return this.history[this.historyIndex] || null;
            }

            async goHistory(delta) {
                const nextIndex = this.historyIndex + delta;
                if (nextIndex < 0 || nextIndex >= this.history.length) return;
                this.rememberCurrentScroll();
                this.historyIndex = nextIndex;
                this.saveHistory();
                this.updateHistoryButtons();
                await this.openHistoryItem(this.history[this.historyIndex], { record: false, restoreScroll: true, revealInTree: true });
            }

            async openHistoryItem(item, options = {}) {
                if (item.type === 'search') {
                    this.searchQuery = item.query || '';
                    if (this.searchEl) this.searchEl.value = this.searchQuery;
                    this.runSearch();
                    return;
                }
                await this.openFile(item.id, { ...options, searchQuery: item.searchQuery || '', record: false });
            }

            restoreHistory() {
                if (this.history.length) return;
                try {
                    const parsed = JSON.parse(localStorage.getItem(this.historyKey) || '{}');
                    const items = Array.isArray(parsed.items) ? parsed.items.map(item => this.normalizeHistoryItem(item)).filter(item => this.itemExists(item)) : [];
                    this.history = items.slice(-this.historyLimit);
                    const index = Number.isInteger(parsed.index) ? parsed.index : this.history.length - 1;
                    this.historyIndex = Math.min(Math.max(index, 0), this.history.length - 1);
                    if (!this.history.length) this.historyIndex = -1;
                } catch (error) {
                    this.history = [];
                    this.historyIndex = -1;
                }
                this.updateHistoryButtons();
            }

            saveHistory() {
                try {
                    localStorage.setItem(this.historyKey, JSON.stringify({ items: this.history, index: this.historyIndex }));
                } catch (error) {
                    // Convenience state only.
                }
            }

            updateHistoryButtons() {
                if (this.backBtn) this.backBtn.disabled = this.historyIndex <= 0;
                if (this.forwardBtn) this.forwardBtn.disabled = this.historyIndex < 0 || this.historyIndex >= this.history.length - 1;
            }

            itemExists(item) {
                if (item.type === 'search') return Boolean(item.query);
                return this.files.some(file => file.path === item.id);
            }

            isSameHistoryItem(left, right) {
                return left?.type === right?.type
                    && left?.id === right?.id
                    && String(left?.searchQuery || '') === String(right?.searchQuery || '')
                    && String(left?.query || '') === String(right?.query || '');
            }

            scrollIdentity(item) {
                return `${item.id || this.currentPath}::${item.searchQuery || ''}`;
            }

            contentScrollRatio(element) {
                if (!element) return 0;
                const maxScroll = element.scrollHeight - element.clientHeight;
                if (maxScroll <= 0) return 0;
                return Math.min(1, Math.max(0, element.scrollTop / maxScroll));
            }

            applyScrollRatio(element, ratio) {
                if (!element || !Number.isFinite(ratio)) return;
                const maxScroll = element.scrollHeight - element.clientHeight;
                element.scrollTop = Math.max(0, maxScroll * Math.min(1, Math.max(0, ratio)));
            }

            restoreRenderedScroll(ratio) {
                window.requestAnimationFrame(() => {
                    this.applyScrollRatio(this.contentEl, ratio);
                    this.rememberCurrentScroll();
                });
            }

            rememberCurrentScroll() {
                if (!this.currentPath || !this.contentEl) return;
                const item = this.currentHistoryItem() || { id: this.currentPath };
                if (item.type !== 'file') return;
                this.scrollPositions[this.scrollIdentity(item)] = this.contentEl.scrollTop;
                this.saveScrollPositions();
            }

            loadScrollPositions() {
                try {
                    const parsed = JSON.parse(localStorage.getItem(this.scrollKey) || '{}');
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch (error) {
                    return {};
                }
            }

            saveScrollPositions() {
                try {
                    localStorage.setItem(this.scrollKey, JSON.stringify(this.scrollPositions));
                } catch (error) {
                    // Convenience state only.
                }
            }

            loadTreeState() {
                try {
                    const parsed = JSON.parse(localStorage.getItem(this.treeStateKey) || '{}');
                    return {
                        folderOpen: parsed && typeof parsed.folderOpen === 'object' ? parsed.folderOpen : {},
                        scrollTop: Number.isFinite(parsed?.scrollTop) ? parsed.scrollTop : 0,
                        mobileCollapsed: parsed?.mobileCollapsed === true,
                    };
                } catch (error) {
                    return { folderOpen: {}, scrollTop: 0, mobileCollapsed: false };
                }
            }

            saveTreeState() {
                try {
                    localStorage.setItem(this.treeStateKey, JSON.stringify(this.treeState));
                } catch (error) {
                    // Convenience state only.
                }
            }

            loadHeadingState() {
                try {
                    const parsed = JSON.parse(localStorage.getItem(this.headingStateKey) || '{}');
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch (error) {
                    return {};
                }
            }

            saveHeadingState() {
                try {
                    localStorage.setItem(this.headingStateKey, JSON.stringify(this.headingState));
                } catch (error) {
                    // Convenience state only.
                }
            }

            loadListState() {
                try {
                    const parsed = JSON.parse(localStorage.getItem(this.listStateKey) || '{}');
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch (error) {
                    return {};
                }
            }

            saveListState() {
                try {
                    localStorage.setItem(this.listStateKey, JSON.stringify(this.listState));
                } catch (error) {
                    // Convenience state only.
                }
            }

            wireHeadingToggles() {
                this.contentEl?.querySelectorAll('[data-wiki-heading-toggle]').forEach(button => {
                    const expanded = button.getAttribute('aria-expanded') !== 'false';
                    const label = expanded ? '收起' : '展开';
                    const text = button.querySelector('.wiki-heading-text')?.textContent?.trim() || '标题';
                    button.setAttribute('aria-label', `${label}：${text}`);
                });
                this.contentEl?.querySelectorAll('[data-wiki-heading-grip]').forEach(button => {
                    const expanded = button.getAttribute('aria-expanded') !== 'false';
                    const label = expanded ? '收起' : '展开';
                    const text = button.closest('.wiki-heading-title')?.querySelector('.wiki-heading-text')?.textContent?.trim() || '标题';
                    button.setAttribute('aria-label', `${label}：${text}`);
                    button.title = `${label}：${text}`;
                });
            }

            toggleHeadingSection(control) {
                const section = control.closest('.wiki-heading-section');
                const body = section?.querySelector(':scope > .wiki-heading-body');
                const button = section?.querySelector(':scope > .wiki-heading-title [data-wiki-heading-toggle]');
                const grip = section?.querySelector(':scope > .wiki-heading-title [data-wiki-heading-grip]');
                const id = control.getAttribute('data-wiki-heading-toggle') || control.getAttribute('data-wiki-heading-grip');
                if (!section || !body || !id) return;
                const nextExpanded = button.getAttribute('aria-expanded') === 'false';
                button.setAttribute('aria-expanded', String(nextExpanded));
                grip?.setAttribute('aria-expanded', String(nextExpanded));
                button.title = `${nextExpanded ? '收起' : '展开'}：${button.querySelector('.wiki-heading-text')?.textContent?.trim() || '标题'}`;
                body.hidden = !nextExpanded;
                section.classList.toggle('is-collapsed', !nextExpanded);
                if (nextExpanded) {
                    delete this.headingState[id];
                } else {
                    this.headingState[id] = true;
                }
                this.saveHeadingState();
                this.wireHeadingToggles();
                this.syncContentFoldButtons();
            }

            setAllContentCollapsed(collapsed) {
                if (!this.contentEl || this.isEditingContent) return;
                let changed = false;
                this.contentEl.querySelectorAll('.wiki-heading-section[data-heading-id]').forEach(section => {
                    const id = section.dataset.headingId;
                    const body = section.querySelector(':scope > .wiki-heading-body');
                    const button = section.querySelector(':scope > .wiki-heading-title [data-wiki-heading-toggle]');
                    const grip = section.querySelector(':scope > .wiki-heading-title [data-wiki-heading-grip]');
                    if (!id || !body || !button) return;
                    button.setAttribute('aria-expanded', String(!collapsed));
                    grip?.setAttribute('aria-expanded', String(!collapsed));
                    body.hidden = collapsed;
                    section.classList.toggle('is-collapsed', collapsed);
                    if (collapsed) {
                        this.headingState[id] = true;
                    } else {
                        delete this.headingState[id];
                    }
                    changed = true;
                });
                this.contentEl.querySelectorAll('li.wiki-list-collapsible[data-wiki-list-id]').forEach(item => {
                    const id = item.dataset.wikiListId;
                    const grip = item.querySelector(':scope > [data-wiki-list-grip]');
                    if (!id || !grip) return;
                    grip.setAttribute('aria-expanded', String(!collapsed));
                    item.classList.toggle('is-collapsed', collapsed);
                    if (collapsed) {
                        this.listState[id] = true;
                    } else {
                        delete this.listState[id];
                    }
                    changed = true;
                });
                if (!changed) return;
                this.saveHeadingState();
                this.saveListState();
                this.wireHeadingToggles();
                this.syncContentFoldButtons();
                this.rememberCurrentScroll();
            }

            syncContentFoldButtons() {
                const hasFoldableContent = Boolean(this.contentEl?.querySelector('.wiki-heading-section[data-heading-id], li.wiki-list-collapsible[data-wiki-list-id]'));
                const disabled = !hasFoldableContent || this.isEditingContent;
                if (this.collapseAllBtn) this.collapseAllBtn.disabled = disabled;
                if (this.expandAllBtn) this.expandAllBtn.disabled = disabled;
            }

            wireListToggles() {
                const candidates = this.contentEl?.querySelectorAll('.wiki-markdown li') || [];
                candidates.forEach(item => {
                    if (item.querySelector(':scope > .wiki-list-grip')) return;
                    const firstDetail = this.firstCollapsibleListDetail(item);
                    if (!firstDetail) return;
                    this.wrapListItemLabel(item, firstDetail);
                    const id = this.listItemStateId(item);
                    const collapsed = Boolean(this.listState[id]);
                    item.classList.add('wiki-list-collapsible');
                    item.classList.toggle('is-collapsed', collapsed);
                    item.dataset.wikiListId = id;
                    const grip = document.createElement('button');
                    grip.type = 'button';
                    grip.className = 'wiki-list-grip';
                    grip.dataset.wikiListGrip = id;
                    grip.textContent = '▾';
                    grip.setAttribute('aria-expanded', String(!collapsed));
                    grip.setAttribute('aria-label', `${collapsed ? '展开' : '收起'}：${this.listItemOwnText(item) || '列表项'}`);
                    item.insertBefore(grip, item.firstChild);
                });
            }

            firstCollapsibleListDetail(item) {
                const children = Array.from(item.children).filter(child => !child.matches('.wiki-list-grip, .wiki-list-label'));
                const directList = children.find(child => child.matches('ul, ol'));
                if (directList) return directList;
                const blockChildren = children.filter(child => this.isListDetailBlock(child));
                return blockChildren.length > 1 ? blockChildren[1] : null;
            }

            isListDetailBlock(element) {
                return element.matches('p, ul, ol, blockquote, pre, table, figure, div');
            }

            wrapListItemLabel(item, firstDetail) {
                if (item.querySelector(':scope > .wiki-list-label')) return;
                const label = document.createElement('span');
                label.className = 'wiki-list-label';
                const nodes = [];
                for (const node of Array.from(item.childNodes)) {
                    if (node === firstDetail) break;
                    if (node.nodeType === Node.ELEMENT_NODE && node.matches('.wiki-list-grip')) continue;
                    nodes.push(node);
                }
                for (const node of nodes) label.appendChild(node);
                item.insertBefore(label, firstDetail);
            }

            toggleListItem(grip) {
                const item = grip.closest('li.wiki-list-collapsible');
                const id = grip.getAttribute('data-wiki-list-grip') || item?.dataset.wikiListId;
                if (!item || !id) return;
                const nextExpanded = grip.getAttribute('aria-expanded') === 'false';
                grip.setAttribute('aria-expanded', String(nextExpanded));
                grip.setAttribute('aria-label', `${nextExpanded ? '收起' : '展开'}：${this.listItemOwnText(item) || '列表项'}`);
                item.classList.toggle('is-collapsed', !nextExpanded);
                if (nextExpanded) {
                    delete this.listState[id];
                } else {
                    this.listState[id] = true;
                }
                this.saveListState();
                this.syncContentFoldButtons();
            }

            listItemStateId(item) {
                const parts = [];
                let current = item;
                while (current && current.matches?.('li')) {
                    parts.unshift(this.listItemOwnText(current) || '列表项');
                    const parentList = current.parentElement;
                    current = parentList?.parentElement?.closest?.('li') || null;
                }
                return `${this.currentPath || 'wiki'}::li:${parts.join('>')}`;
            }

            listItemOwnText(item) {
                const clone = item.cloneNode(true);
                clone.querySelectorAll('ul, ol, .wiki-list-grip').forEach(node => node.remove());
                return clone.textContent.replace(/\s+/g, ' ').trim();
            }

            loadSelectedPath() {
                try {
                    return localStorage.getItem(this.selectedKey) || '';
                } catch (error) {
                    return '';
                }
            }

            saveSelectedPath(path) {
                try {
                    localStorage.setItem(this.selectedKey, path);
                } catch (error) {
                    // Convenience state only.
                }
            }

            clearSearchDisplay() {
                if (!this.searchQuery) return;
                this.searchQuery = '';
                if (this.searchEl) this.searchEl.value = '';
                this.setStatus(this.files.length ? `${this.files.length} 个文件` : '');
            }

            fileTitle(file) {
                return String(file?.path || '').split('/').pop() || '未命名';
            }

            plainText(value) {
                return String(value || '')
                    .replace(/```[\s\S]*?```/g, ' ')
                    .replace(/[#>*_`[\]()|-]+/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
            }

            searchSnippet(content, query) {
                const text = this.plainText(content);
                const index = text.toLowerCase().indexOf(query.toLowerCase());
                if (index < 0) return '';
                const start = Math.max(0, index - 44);
                const end = Math.min(text.length, index + query.length + 64);
                const snippet = `${start > 0 ? '...' : ''}${text.slice(start, end)}${end < text.length ? '...' : ''}`;
                const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                return this.escapeHtml(snippet).replace(new RegExp(escapedQuery, 'ig'), match => `<mark>${match}</mark>`);
            }

            renderEmpty(message) {
                if (this.titleEl) this.titleEl.textContent = 'Wiki';
                if (this.pathEl) this.pathEl.textContent = '';
                if (this.contentEl) {
                    this.setContentEditingState(false);
                    this.contentEl.innerHTML = `<p class="wiki-empty">${this.escapeHtml(message)}</p>`;
                }
                this.syncContentFoldButtons();
            }

            setStatus(message) {
                if (this.statusEl) this.statusEl.textContent = message || '';
            }

            escapeHtml(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            renderMarkdownFile(file) {
                const rendered = String(file?.html || '').trim();
                if (rendered) return this.renderCollapsibleHTML(rendered);
                return this.renderMarkdown(file?.content || '');
            }

            renderCollapsibleHTML(renderedHtml) {
                const template = document.createElement('template');
                template.innerHTML = renderedHtml;
                this.removeLeadingHeading(template.content);
                const root = { children: [] };
                const stack = [{ level: 0, node: root }];
                const counts = new Map();
                for (const node of Array.from(template.content.childNodes)) {
                    const heading = node.nodeType === Node.ELEMENT_NODE ? /^H([1-6])$/.exec(node.tagName) : null;
                    if (!heading) {
                        stack[stack.length - 1].node.children.push({ type: 'html', html: this.nodeToHTML(node) });
                        continue;
                    }
                    const level = Number(heading[1]);
                    while (stack.length > 1 && stack[stack.length - 1].level >= level) {
                        stack.pop();
                    }
                    const text = node.textContent?.trim() || `标题 ${level}`;
                    const keyBase = `${level}:${text}`;
                    const count = counts.get(keyBase) || 0;
                    counts.set(keyBase, count + 1);
                    const section = {
                        type: 'heading',
                        level,
                        id: this.headingStateId({ level, text }, count),
                        originalId: node.getAttribute('id') || '',
                        text,
                        html: node.innerHTML,
                        children: [],
                    };
                    stack[stack.length - 1].node.children.push(section);
                    stack.push({ level, node: section });
                }
                const html = root.children.map(child => this.renderCollapsibleNode(child)).join('');
                return html || '<p class="wiki-empty">这个页面还没有内容。</p>';
            }

            removeLeadingHeading(fragment) {
                for (const node of Array.from(fragment.childNodes)) {
                    if (node.nodeType === Node.TEXT_NODE && !node.textContent.trim()) {
                        node.remove();
                        continue;
                    }
                    if (node.nodeType === Node.ELEMENT_NODE && /^H[1-6]$/.test(node.tagName)) {
                        node.remove();
                    }
                    return;
                }
            }

            nodeToHTML(node) {
                if (node.nodeType === Node.TEXT_NODE) return this.escapeHtml(node.textContent || '');
                if (node.nodeType !== Node.ELEMENT_NODE) return '';
                return node.outerHTML || '';
            }

            renderMarkdown(markdown) {
                const blocks = this.parseMarkdownBlocks(markdown);
                if (blocks[0]?.type === 'heading') blocks.shift();
                if (!blocks.length) return '<p class="wiki-empty">这个页面还没有内容。</p>';
                return this.renderCollapsibleBlocks(blocks);
            }

            parseMarkdownBlocks(markdown) {
                const lines = String(markdown || '').replace(/\r\n/g, '\n').split('\n');
                const blocks = [];
                let paragraph = [];
                let list = [];
                let orderedList = [];
                let blockquote = [];
                let inCode = false;
                let code = [];
                const flushParagraph = () => {
                    if (paragraph.length) {
                        blocks.push({ type: 'html', html: `<p>${this.renderInline(paragraph.join('\n'))}</p>` });
                        paragraph = [];
                    }
                };
                const flushList = () => {
                    if (list.length) {
                        blocks.push({ type: 'html', html: `<ul>${list.map(item => `<li>${this.renderInline(item)}</li>`).join('')}</ul>` });
                        list = [];
                    }
                };
                const flushOrderedList = () => {
                    if (orderedList.length) {
                        blocks.push({ type: 'html', html: `<ol>${orderedList.map(item => `<li>${this.renderInline(item)}</li>`).join('')}</ol>` });
                        orderedList = [];
                    }
                };
                const flushBlockquote = () => {
                    if (blockquote.length) {
                        blocks.push({ type: 'html', html: `<blockquote>${this.renderMarkdown(blockquote.join('\n'))}</blockquote>` });
                        blockquote = [];
                    }
                };
                const flushBlocks = () => {
                    flushParagraph();
                    flushList();
                    flushOrderedList();
                    flushBlockquote();
                };
                const isTableDivider = line => /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
                const isTableRow = line => line.includes('|') && !line.trim().startsWith('|---') && !isTableDivider(line);
                const parseTableRow = line => {
                    let value = line.trim();
                    if (value.startsWith('|')) value = value.slice(1);
                    if (value.endsWith('|')) value = value.slice(0, -1);
                    return value.split('|').map(cell => cell.trim());
                };
                for (let index = 0; index < lines.length; index += 1) {
                    const line = lines[index];
                    const trimmed = line.trim();
                    if (trimmed.startsWith('```')) {
                        if (inCode) {
                            blocks.push({ type: 'html', html: `<pre><code>${this.escapeHtml(code.join('\n'))}</code></pre>` });
                            code = [];
                            inCode = false;
                        } else {
                            flushBlocks();
                            inCode = true;
                        }
                        continue;
                    }
                    if (inCode) {
                        code.push(line);
                        continue;
                    }
                    if (!trimmed) {
                        flushBlocks();
                        continue;
                    }
                    if (/^---+$/.test(trimmed) || /^\*\*\*+$/.test(trimmed)) {
                        flushBlocks();
                        blocks.push({ type: 'html', html: '<hr>' });
                        continue;
                    }
                    if (trimmed.startsWith('>')) {
                        flushParagraph();
                        flushList();
                        flushOrderedList();
                        blockquote.push(trimmed.replace(/^>\s?/, ''));
                        continue;
                    }
                    if (isTableRow(line) && index + 1 < lines.length && isTableDivider(lines[index + 1])) {
                        flushBlocks();
                        const headers = parseTableRow(line);
                        index += 2;
                        const rows = [];
                        while (index < lines.length && isTableRow(lines[index])) {
                            rows.push(parseTableRow(lines[index]));
                            index += 1;
                        }
                        index -= 1;
                        blocks.push({ type: 'html', html: `<table><thead><tr>${headers.map(cell => `<th>${this.renderInline(cell)}</th>`).join('')}</tr></thead><tbody>${rows.map(row => `<tr>${headers.map((_header, cellIndex) => `<td>${this.renderInline(row[cellIndex] || '')}</td>`).join('')}</tr>`).join('')}</tbody></table>` });
                        continue;
                    }
                    const heading = /^(#{1,6})\s+(.+)$/.exec(trimmed);
                    if (heading) {
                        flushBlocks();
                        const level = heading[1].length;
                        blocks.push({
                            type: 'heading',
                            level,
                            text: this.stripHtml(this.renderInline(heading[2])).trim() || `标题 ${level}`,
                            html: this.renderInline(heading[2]),
                        });
                        continue;
                    }
                    const bullet = /^[-*]\s+(.+)$/.exec(trimmed);
                    if (bullet) {
                        flushParagraph();
                        flushOrderedList();
                        flushBlockquote();
                        list.push(bullet[1]);
                        continue;
                    }
                    const ordered = /^\d+\.\s+(.+)$/.exec(trimmed);
                    if (ordered) {
                        flushParagraph();
                        flushList();
                        flushBlockquote();
                        orderedList.push(ordered[1]);
                        continue;
                    }
                    paragraph.push(trimmed);
                }
                flushBlocks();
                if (inCode) blocks.push({ type: 'html', html: `<pre><code>${this.escapeHtml(code.join('\n'))}</code></pre>` });
                return blocks;
            }

            renderCollapsibleBlocks(blocks) {
                const root = { children: [] };
                const stack = [{ level: 0, node: root }];
                const counts = new Map();
                for (const block of blocks) {
                    if (block.type !== 'heading') {
                        stack[stack.length - 1].node.children.push(block);
                        continue;
                    }
                    while (stack.length > 1 && stack[stack.length - 1].level >= block.level) {
                        stack.pop();
                    }
                    const parent = stack[stack.length - 1].node;
                    const keyBase = `${block.level}:${block.text}`;
                    const count = counts.get(keyBase) || 0;
                    counts.set(keyBase, count + 1);
                    const section = { ...block, id: this.headingStateId(block, count), children: [] };
                    parent.children.push(section);
                    stack.push({ level: block.level, node: section });
                }
                return root.children.map(child => this.renderCollapsibleNode(child)).join('');
            }

            renderCollapsibleNode(node) {
                if (node.type === 'html') return node.html;
                const level = Math.min(Math.max(node.level, 1), 6);
                const collapsed = Boolean(this.headingState[node.id]);
                const body = node.children.map(child => this.renderCollapsibleNode(child)).join('');
                const title = this.escapeHtml(node.text);
                const originalId = node.originalId ? ` id="${this.escapeHtml(node.originalId)}"` : '';
                return `<section class="wiki-heading-section${collapsed ? ' is-collapsed' : ''}" data-heading-level="${level}" data-heading-id="${this.escapeHtml(node.id)}">
                    <h${level}${originalId} class="wiki-heading-title">
                        <button class="wiki-heading-grip" type="button" data-wiki-heading-grip="${this.escapeHtml(node.id)}" aria-expanded="${collapsed ? 'false' : 'true'}" title="${collapsed ? '展开' : '收起'}：${title}" aria-label="${collapsed ? '展开' : '收起'}：${title}">▾</button>
                        <button class="wiki-heading-toggle" type="button" data-wiki-heading-toggle="${this.escapeHtml(node.id)}" aria-expanded="${collapsed ? 'false' : 'true'}" title="${collapsed ? '展开' : '收起'}：${title}">
                            <span class="wiki-heading-icon" aria-hidden="true">▾</span>
                            <span class="wiki-heading-text">${node.html}</span>
                        </button>
                    </h${level}>
                    <div class="wiki-heading-body"${collapsed ? ' hidden' : ''}>${body}</div>
                </section>`;
            }

            headingStateId(block, count) {
                const safePath = this.currentPath || 'wiki';
                return `${safePath}::h${block.level}:${block.text}:${count}`;
            }

            renderInline(text) {
                let value = this.escapeHtml(text);
                value = value.replace(/`([^`]+)`/g, '<code>$1</code>');
                value = value.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                value = value.replace(/!\[([^\]]*)\]\(<([^>]+)>\)/g, (_match, label, href) => {
                    return this.renderMediaLink(label, href) || _match;
                });
                value = value.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_match, label, href) => {
                    return this.renderMediaLink(label, href) || _match;
                });
                value = value.replace(/\[([^\]]+)\]\(<([^>]+)>\)/g, (_match, label, href) => {
                    return this.renderMarkdownLink(label, href);
                });
                value = value.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_match, label, href) => {
                    return this.renderMarkdownLink(label, href);
                });
                return value;
            }

            renderMarkdownLink(label, href) {
                const cleanHref = this.decodeEscapedMarkdownHref(href.trim());
                if (/^[a-z][a-z0-9+.-]*:/i.test(cleanHref)) {
                    return `<a href="${this.escapeHtml(cleanHref)}" target="_blank" rel="noreferrer">${label}</a>`;
                }
                if (cleanHref.endsWith('.md') || cleanHref.includes('.md#')) {
                    return `<a href="#" data-wiki-link="${this.escapeHtml(cleanHref.split('#')[0])}">${label}</a>`;
                }
                const assetHref = this.resolveAssetHref(cleanHref);
                return `<a href="${this.escapeHtml(assetHref)}" target="_blank" rel="noreferrer">${label}</a>`;
            }

            renderMediaLink(label, href) {
                const cleanHref = this.decodeEscapedMarkdownHref(href);
                const pathOnly = cleanHref.split(/[?#]/)[0].toLowerCase();
                if (!/\.(png|jpe?g|gif|webp|avif|svg)$/.test(pathOnly)) return '';
                const safeHref = this.escapeHtml(this.resolveAssetHref(cleanHref));
                const plainLabel = this.stripHtml(label).trim();
                const caption = plainLabel ? `<figcaption>${label}</figcaption>` : '';
                return `<figure class="wiki-media"><img src="${safeHref}" alt="${this.escapeHtml(plainLabel)}" loading="lazy" decoding="async">${caption}</figure>`;
            }

            stripHtml(value) {
                return String(value || '').replace(/<[^>]*>/g, '');
            }

            resolveAssetHref(href) {
                const cleanHref = this.decodeEscapedMarkdownHref(href);
                if (/^(https?:|mailto:|data:|blob:)/i.test(cleanHref)) return cleanHref;
                const [pathPart, suffix = ''] = cleanHref.split(/([?#].*)/, 2);
                const base = this.currentPath && this.currentPath.includes('/') ? this.currentPath.split('/').slice(0, -1) : [];
                const parts = pathPart.startsWith('/') ? [] : base;
                for (const segment of pathPart.split('/')) {
                    if (!segment || segment === '.') continue;
                    if (segment === '..') parts.pop();
                    else parts.push(segment);
                }
                const encoded = parts.map(segment => encodeURIComponent(segment)).join('/');
                return `/wiki/${encoded}${suffix || ''}`;
            }

            decodeEscapedMarkdownHref(value) {
                return String(value || '')
                    .trim()
                    .replace(/&lt;/g, '<')
                    .replace(/&gt;/g, '>')
                    .replace(/&amp;/g, '&')
                    .replace(/&quot;/g, '"')
                    .replace(/&#39;/g, "'")
                    .replace(/^<|>$/g, '');
            }

            wireRenderedMarkdownAssets() {
                this.contentEl.querySelectorAll('.wiki-markdown img[src]').forEach(image => {
                    const src = image.getAttribute('src') || '';
                    if (/^(https?:|data:|blob:)/i.test(src)) return;
                    image.src = this.resolveAssetHref(src);
                    image.loading = 'lazy';
                    image.decoding = 'async';
                });
                this.contentEl.querySelectorAll('.wiki-markdown a[href]').forEach(link => {
                    const href = link.getAttribute('href') || '';
                    if (!href || href.startsWith('#') || /^[a-z][a-z0-9+.-]*:/i.test(href)) return;
                    if (/\.md(?:$|[#?])/i.test(href)) {
                        link.dataset.wikiLink = href.split('#')[0].split('?')[0];
                        link.href = '#';
                        return;
                    }
                    link.href = this.resolveAssetHref(href);
                    link.target = '_blank';
                    link.rel = 'noreferrer';
                });
            }

            wireInternalLinks() {
                this.contentEl.querySelectorAll('[data-wiki-link]').forEach(link => {
                    link.addEventListener('click', (event) => {
                        event.preventDefault();
                        const target = link.getAttribute('data-wiki-link');
                        const resolved = this.resolveWikiLink(target);
                        if (resolved) this.openFile(resolved, { record: true, restoreScroll: true });
                    });
                });
            }

            resolveWikiLink(target) {
                const direct = this.files.find(file => file.path === target || file.path.endsWith(`/${target}`));
                if (direct) return direct.path;
                if (!this.currentPath.includes('/')) return target;
                const base = this.currentPath.split('/').slice(0, -1);
                for (const segment of String(target || '').split('/')) {
                    if (!segment || segment === '.') continue;
                    if (segment === '..') base.pop();
                    else base.push(segment);
                }
                const resolved = base.join('/');
                return this.files.some(file => file.path === resolved) ? resolved : target;
            }

            highlightSearchMatches(query) {
                query = String(query || '').trim();
                if (!query) return;
                const pattern = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'ig');
                const walker = document.createTreeWalker(this.contentEl, NodeFilter.SHOW_TEXT, {
                    acceptNode(node) {
                        const parent = node.parentElement;
                        if (!parent || !node.nodeValue || !pattern.test(node.nodeValue)) {
                            pattern.lastIndex = 0;
                            return NodeFilter.FILTER_REJECT;
                        }
                        pattern.lastIndex = 0;
                        if (parent.closest('button, input, textarea, select, mark')) {
                            return NodeFilter.FILTER_REJECT;
                        }
                        return NodeFilter.FILTER_ACCEPT;
                    },
                });
                const nodes = [];
                while (walker.nextNode()) nodes.push(walker.currentNode);
                for (const node of nodes) {
